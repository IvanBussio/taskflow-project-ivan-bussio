<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TaskFlow Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:'Inter', sans-serif;
min-height:100vh;
color:white;
text-align:center;
transition:0.4s;

background:
radial-gradient(circle at 20% 20%, #4f46e5, transparent 40%),
radial-gradient(circle at 80% 30%, #06b6d4, transparent 40%),
radial-gradient(circle at 40% 80%, #9333ea, transparent 40%),
#020617;

background-size:200% 200%;
animation:auroraMove 12s ease infinite;
}

@keyframes auroraMove{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

body.light{
background:#f4f6fb;
color:#222;
}

h1{
margin-top:40px;
font-size:40px;
}

.subtitle{
opacity:0.8;
margin-bottom:30px;
}

/* toggle */

.toggle{
margin:20px auto;
width:60px;
height:35px;
border-radius:20px;
background:#111;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:18px;
}

/* stats */

.stats{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:20px;
flex-wrap:wrap;
}

.card{
background:rgba(255,255,255,0.2);
padding:20px;
border-radius:12px;
width:140px;
transition:0.25s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

body.light .card{
background:white;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* progress */

.progress-container{
width:70%;
height:10px;
background:rgba(255,255,255,0.3);
margin:20px auto;
border-radius:10px;
overflow:hidden;
}

body.light .progress-container{
background:#ddd;
}

.progress-bar{
height:100%;
width:0%;
background:#4dabf7;
transition:0.3s;
}

/* input */

.input-area{
margin:25px;
}

input{
padding:10px;
border:none;
border-radius:8px;
width:200px;
}

button{
padding:10px 16px;
border:none;
border-radius:8px;
background:#4dabf7;
color:white;
cursor:pointer;
font-weight:500;
transition:0.25s;
}

button:hover{
transform:translateY(-3px);
box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

/* board */

.board{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
padding-bottom:50px;
}

.column{
background:rgba(255,255,255,0.15);
padding:20px;
border-radius:15px;
width:250px;
min-height:300px;
transition:0.25s;
}

.column:hover{
transform:translateY(-6px);
box-shadow:0 10px 30px rgba(0,0,0,0.35);
}

body.light .column{
background:white;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* tareas */

.task{
background:white;
color:black;
padding:12px;
border-radius:10px;
margin-top:10px;
cursor:pointer;
font-weight:500;
transition:0.2s;
animation:appear 0.3s ease;
}

.task:hover{
transform:scale(1.04);
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

@keyframes appear{

from{
opacity:0;
transform:translateY(-10px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.dragging{
opacity:0.5;
}

</style>

</head>

<body>

<h1>TaskFlow Pro</h1>
<p class="subtitle">Organiza tu trabajo con un tablero Kanban</p>

<div class="toggle" onclick="toggleMode()" id="modeBtn">🌙</div>

<div class="stats">

<div class="card">
<p>Tareas Totales</p>
<h2 id="totalTasks">0</h2>
</div>

<div class="card">
<p>Completadas</p>
<h2 id="completedTasks">0</h2>
</div>

<div class="card">
<p>En Progreso</p>
<h2 id="progressTasks">0</h2>
</div>

</div>

<div class="progress-container">
<div class="progress-bar" id="progressBar"></div>
</div>

<p id="progressText">0% completado</p>

<div class="input-area">
<input id="taskInput" placeholder="Nueva tarea">
<button onclick="addTask()">Añadir</button>
</div>

<div class="board">

<div class="column">
<h3>📌 POR HACER</h3>
<div id="todo"></div>
</div>

<div class="column">
<h3>⚙️ EN PROGRESO</h3>
<div id="progress"></div>
</div>

<div class="column">
<h3>✅ COMPLETADO</h3>
<div id="done"></div>
</div>

</div>

<script>

/* modo oscuro */

function toggleMode(){

const body=document.body
const btn=document.getElementById("modeBtn")

body.classList.toggle("light")

btn.innerHTML=body.classList.contains("light") ? "☀️" : "🌙"

}

/* crear tarea */

function createTask(text,column){

const task=document.createElement("div")

task.className="task"
task.innerText=text
task.draggable=true

task.addEventListener("dragstart",()=>{
task.classList.add("dragging")
})

task.addEventListener("dragend",()=>{
task.classList.remove("dragging")
guardar()
updateStats()
})

task.onclick=function(){

const parent=task.parentElement.id

if(parent==="todo"){
document.getElementById("progress").appendChild(task)

}else if(parent==="progress"){
document.getElementById("done").appendChild(task)

}else if(parent==="done"){
document.getElementById("progress").appendChild(task)
}

guardar()
updateStats()

}

task.addEventListener("contextmenu",function(e){

e.preventDefault()

task.remove()

guardar()
updateStats()

})

document.getElementById(column).appendChild(task)

}

/* añadir tarea */

function addTask(){

const input=document.getElementById("taskInput")

const text=input.value.trim()

if(text==="") return

createTask(text,"todo")

input.value=""

guardar()

updateStats()

}

/* drag columnas */

document.querySelectorAll(".column div").forEach(column=>{

column.addEventListener("dragover",e=>{
e.preventDefault()
const dragging=document.querySelector(".dragging")
column.appendChild(dragging)
})

})

/* estadísticas */

function updateStats(){

const todo=document.querySelectorAll("#todo .task").length
const progress=document.querySelectorAll("#progress .task").length
const done=document.querySelectorAll("#done .task").length

const total=todo+progress+done

document.getElementById("totalTasks").innerText=total
document.getElementById("completedTasks").innerText=done
document.getElementById("progressTasks").innerText=progress

let percent=0

if(total>0){
percent=Math.round((done/total)*100)
}

document.getElementById("progressBar").style.width=percent+"%"
document.getElementById("progressText").innerText=percent+"% completado"

}

/* guardar */

function guardar(){

const data={
todo:[...document.querySelectorAll("#todo .task")].map(t=>t.innerText),
progress:[...document.querySelectorAll("#progress .task")].map(t=>t.innerText),
done:[...document.querySelectorAll("#done .task")].map(t=>t.innerText)
}

localStorage.setItem("taskflow",JSON.stringify(data))

}

/* cargar */

function cargar(){

const data=JSON.parse(localStorage.getItem("taskflow"))

if(!data) return

data.todo.forEach(t=>createTask(t,"todo"))
data.progress.forEach(t=>createTask(t,"progress"))
data.done.forEach(t=>createTask(t,"done"))

updateStats()

}

cargar()

</script>

</body>
</html>
