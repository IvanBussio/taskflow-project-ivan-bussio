<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TaskFlow</title>

<style>

/* BASE */

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
min-height:100vh;
transition:0.6s;
overflow-x:hidden;
}

/* AURORA BACKGROUND */

.aurora-background{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
overflow:hidden;
}

.aurora{
position:absolute;
width:120%;
height:120%;
filter:blur(120px);
animation:auroraMove 20s infinite alternate ease-in-out;
}

@keyframes auroraMove{

0%{transform:translate(-20%,-20%) scale(1);}
50%{transform:translate(20%,10%) scale(1.2);}
100%{transform:translate(-10%,20%) scale(1);}

}

/* PARTICLES */

.particles::before,
.particles::after{

content:"";
position:absolute;
width:200%;
height:200%;

background-image:
radial-gradient(2px 2px at 20% 30%,white,transparent),
radial-gradient(2px 2px at 60% 70%,white,transparent),
radial-gradient(2px 2px at 80% 20%,white,transparent),
radial-gradient(2px 2px at 40% 80%,white,transparent);

animation:particlesMove 60s linear infinite;

opacity:0.35;

}

@keyframes particlesMove{

from{transform:translateY(0);}
to{transform:translateY(-800px);}

}

/* LIGHT MODE */

body.light{
background:#f7f9fc;
color:#1f2937;
}

body.light .aurora:nth-child(1){
background:radial-gradient(circle,rgba(255,182,193,0.4),transparent);
}

body.light .aurora:nth-child(2){
background:radial-gradient(circle,rgba(173,216,230,0.4),transparent);
}

body.light .aurora:nth-child(3){
background:radial-gradient(circle,rgba(221,160,221,0.4),transparent);
}

/* DARK MODE */

body.dark{
background:#0f172a;
color:white;
}

body.dark .aurora:nth-child(1){
background:radial-gradient(circle,rgba(0,255,200,0.35),transparent);
}

body.dark .aurora:nth-child(2){
background:radial-gradient(circle,rgba(0,150,255,0.35),transparent);
}

body.dark .aurora:nth-child(3){
background:radial-gradient(circle,rgba(140,0,255,0.35),transparent);
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
font-size:22px;
font-weight:bold;
}

.toggle{
cursor:pointer;
font-size:22px;
transition:0.3s;
}

.toggle:hover{
transform:rotate(20deg) scale(1.1);
}

/* CONTAINER */

.container{
max-width:700px;
margin:40px auto;
}

/* CARDS */

.card{

padding:25px;
border-radius:14px;
margin-bottom:20px;

backdrop-filter:blur(14px);

transition:0.3s;

}

body.light .card{
background:rgba(255,255,255,0.75);
color:#111;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

body.dark .card{
background:rgba(20,30,40,0.7);
color:white;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.card:hover{
transform:translateY(-5px);
}

/* INPUT */

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:none;
}

/* BUTTON */

button{
padding:8px 14px;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:10px;
transition:0.25s;
}

button:hover{
transform:translateY(-2px) scale(1.02);
}

.primary{
background:linear-gradient(135deg,#3b82f6,#6366f1);
color:white;
}

/* TASK */

.task{
display:flex;
justify-content:space-between;
padding:8px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.completed{
text-decoration:line-through;
opacity:0.6;
}

/* INTRO */

#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
z-index:10;
}

#intro h1{
font-size:60px;
}

#intro button{
padding:12px 24px;
font-size:18px;
background:#3b82f6;
color:white;
}

</style>

</head>

<body class="light">

<div class="aurora-background">
<div class="aurora"></div>
<div class="aurora"></div>
<div class="aurora"></div>
<div class="particles"></div>
</div>

<div id="intro">

<h1>TaskFlow</h1>
<p>Organiza tus tareas y mantén el control de tu flujo de trabajo</p>

<button onclick="startApp()">Comenzar</button>

</div>

<div id="app" style="display:none;">

<header>

TaskFlow

<div class="toggle" id="themeToggle">🌙</div>

</header>

<div class="container">

<div class="card">

<h3>Crear nueva tarea</h3>

<input id="taskTitle" placeholder="Título de la tarea">

<textarea id="taskDescription" placeholder="Descripción"></textarea>

<button class="primary" onclick="addTask()">Añadir tarea</button>

</div>

<div class="card">

<h3>Tus tareas</h3>

<input id="searchTask" placeholder="Buscar tareas...">

<div class="filters">

<button onclick="filterTasks('all',this)" class="active">Todas</button>
<button onclick="filterTasks('pending',this)">Pendientes</button>
<button onclick="filterTasks('completed',this)">Completadas</button>

<button onclick="sortTasks()">Orden A-Z</button>

</div>

<div id="taskList"></div>

</div>

</div>

</div>

<script>

let tasks=[];
let currentFilter="all";

/* START APP */

function startApp(){

document.getElementById("intro").style.display="none";
document.getElementById("app").style.display="block";

}

/* ADD TASK */

function addTask(){

const title=document.getElementById("taskTitle").value.trim();

if(title==="") return;

tasks.push({
title:title,
completed:false
});

document.getElementById("taskTitle").value="";
renderTasks();

}

/* RENDER */

function renderTasks(){

const list=document.getElementById("taskList");
list.innerHTML="";

let filtered=[...tasks];

if(currentFilter==="completed"){
filtered=filtered.filter(t=>t.completed);
}

if(currentFilter==="pending"){
filtered=filtered.filter(t=>!t.completed);
}

const search=document.getElementById("searchTask").value.toLowerCase();

filtered=filtered.filter(t=>t.title.toLowerCase().includes(search));

filtered.forEach((task,index)=>{

const div=document.createElement("div");
div.className="task";

const text=document.createElement("span");
text.textContent=task.title;

if(task.completed){
text.classList.add("completed");
}

text.onclick=()=>{
task.completed=!task.completed;
renderTasks();
};

const del=document.createElement("button");
del.textContent="X";

del.onclick=()=>{
tasks.splice(index,1);
renderTasks();
};

div.appendChild(text);
div.appendChild(del);

list.appendChild(div);

});

}

document.getElementById("searchTask").addEventListener("input",renderTasks);

/* FILTER */

function filterTasks(type,btn){

currentFilter=type;

document.querySelectorAll(".filters button").forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

renderTasks();

}

/* SORT */

function sortTasks(){

tasks.sort((a,b)=>a.title.localeCompare(b.title));

renderTasks();

}

/* THEME */

const toggle=document.getElementById("themeToggle");

toggle.onclick=()=>{

const body=document.body;

if(body.classList.contains("light")){
body.classList.remove("light");
body.classList.add("dark");
toggle.textContent="☀️";
}
else{
body.classList.remove("dark");
body.classList.add("light");
toggle.textContent="🌙";
}

};

</script>

</body>
</html>
