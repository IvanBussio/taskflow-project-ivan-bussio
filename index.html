<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TaskFlow Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter', sans-serif;
min-height:100vh;
color:white;
text-align:center;

background:
radial-gradient(circle at 20% 20%, #4f46e5, transparent 40%),
radial-gradient(circle at 80% 30%, #06b6d4, transparent 40%),
radial-gradient(circle at 40% 80%, #9333ea, transparent 40%),
#020617;

background-size:200% 200%;
animation:auroraMove 15s ease infinite;
}

@keyframes auroraMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* MODO CLARO */

body.light{
color:#222;

background:
radial-gradient(circle at 20% 20%, #86efac, transparent 40%),
radial-gradient(circle at 80% 30%, #f9a8d4, transparent 40%),
radial-gradient(circle at 40% 80%, #7dd3fc, transparent 40%),
#f8fafc;

background-size:200% 200%;
animation:auroraMove 15s ease infinite;
}

h1{
margin-top:40px;
font-size:40px;
}

.subtitle{
opacity:0.8;
margin-bottom:25px;
}

.toggle{
margin:20px auto;
width:60px;
height:35px;
border-radius:20px;
background:#111;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

/* stats */

.stats{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:20px;
flex-wrap:wrap;
}

.card{
background:rgba(255,255,255,0.2);
padding:20px;
border-radius:12px;
width:150px;
}

body.light .card{
background:white;
}

/* progress */

.progress-container{
width:70%;
height:10px;
background:rgba(255,255,255,0.3);
margin:20px auto;
border-radius:10px;
overflow:hidden;
}

body.light .progress-container{
background:#ddd;
}

.progress-bar{
height:100%;
width:0%;
background:#4dabf7;
}

/* input */

.input-area{
margin:25px;
}

input{
padding:10px;
border:none;
border-radius:8px;
width:220px;
}

button{
padding:10px 16px;
border:none;
border-radius:8px;
background:#4dabf7;
color:white;
cursor:pointer;
}

/* board */

.board{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
padding-bottom:50px;
}

.column{
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:18px;
width:260px;
min-height:300px;
}

body.light .column{
background:rgba(255,255,255,0.65);
}

/* tareas */

.task{
background:white;
color:black;
padding:12px;
border-radius:10px;
margin-top:10px;
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
}

/* GRIS CLARO EN MODO CLARO */

body.light .task{
background:#f1f5f9;
color:#111;
}

/* botón volver */

.back-btn{
border:none;
padding:4px 8px;
border-radius:6px;
cursor:pointer;
font-size:12px;
background:rgba(0,0,0,0.2);
color:white;
}

body.light .back-btn{
background:#e5e7eb;
color:#111;
}

/* móvil */

@media (max-width:768px){

.stats{
flex-direction:column;
align-items:center;
}

.card{
width:80%;
}

.board{
flex-direction:column;
align-items:center;
}

.column{
width:90%;
}

input,button{
width:85%;
}

}

</style>

</head>

<body>

<h1>TaskFlow Pro</h1>
<p class="subtitle">Organiza tu trabajo con un tablero Kanban</p>

<div class="toggle" onclick="toggleMode()" id="modeBtn">🌙</div>

<div class="stats">

<div class="card">
<p>Tareas Totales</p>
<h2 id="totalTasks">0</h2>
</div>

<div class="card">
<p>Completadas</p>
<h2 id="completedTasks">0</h2>
</div>

<div class="card">
<p>En Curso</p>
<h2 id="progressTasks">0</h2>
</div>

</div>

<div class="progress-container">
<div class="progress-bar" id="progressBar"></div>
</div>

<p id="progressText">0% completado</p>

<div class="input-area">
<input id="taskInput" placeholder="Nueva tarea..." autocomplete="off">
<button onclick="addTask()">Añadir</button>
</div>

<div class="board">

<div class="column">
<h3>📌 POR HACER</h3>
<div id="todo"></div>
</div>

<div class="column">
<h3>⚙️ EN CURSO</h3>
<div id="progress"></div>
</div>

<div class="column">
<h3>✅ COMPLETADO</h3>
<div id="done"></div>
</div>

</div>

<script>

function
