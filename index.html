<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TaskFlow PRO</title>

<!-- Fuente PRO -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
  font-family:'Inter',sans-serif;
  overflow-x:hidden;
}

/* 🌿 MODO CLARO */
body.light{
  background:linear-gradient(120deg,#c7f9cc,#a8e6cf,#b7efc5);
}

/* 🌌 MODO OSCURO */
body.dark{
  background:linear-gradient(120deg,#020617,#0f172a,#1e1b4b);
  color:white;
}

/* canvas */
.canvas-bg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}

/* glass */
.glass{
  background:rgba(255,255,255,.45);
  backdrop-filter:blur(14px);
  border-radius:20px;
  padding:25px;
}

.dark .glass{
  background:rgba(15,23,42,.6);
}

/* botones */
.btn{
  padding:10px 16px;
  border-radius:10px;
  background:rgba(255,255,255,.6);
  transition:all .25s ease;
}

.btn:hover{
  transform:translateY(-3px) scale(1.05);
  box-shadow:0 10px 25px rgba(0,0,0,.2);
}

/* tareas */
.task{
  background:rgba(255,255,255,.7);
  padding:12px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-top:10px;
  transition:.2s;
}

.dark .task{
  background:rgba(30,41,59,.7);
}

/* texto tachado */
.completed span{
  text-decoration:line-through;
  opacity:0.6;
}

/* chip */
.chip{
  background:#34d399;
  color:white;
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
}

/* input */
input{
  outline:none;
}

</style>

</head>

<body class="light px-6 py-6">

<canvas id="bgCanvas" class="canvas-bg"></canvas>

<!-- HEADER -->
<header class="flex justify-between items-center mb-10">

<h1 class="text-4xl font-semibold">TaskFlow</h1>

<div class="flex gap-2">
<button onclick="openInfo()" class="btn">ℹ</button>
<button onclick="toggleTheme()" class="btn">🌙</button>
</div>

</header>

<!-- INPUT -->
<div class="glass max-w-5xl mx-auto mb-6">

<input id="taskInput" placeholder="Escribe tu tarea..." class="w-full p-3 rounded mb-2 text-black">

<input id="categoryInput" placeholder="Categoría..." class="w-full p-3 rounded mb-2 text-black">

<div id="suggestions" class="text-sm mb-2"></div>

<div class="flex gap-2">
<button onclick="addTask()" class="btn">Añadir</button>
<button onclick="sortTasks()" class="btn">Ordenar A-Z</button>
</div>

</div>

<!-- LISTA -->
<div class="glass max-w-5xl mx-auto">
<div id="taskList"></div>
</div>

<!-- MODAL INFO -->
<div id="infoModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center" onclick="closeInfo(event)">

<div class="bg-white p-6 rounded-xl max-w-md" onclick="event.stopPropagation()">

<h2 class="text-2xl mb-3">TaskFlow PRO</h2>

<p class="text-sm">
TaskFlow es una app moderna de gestión de tareas con categorías inteligentes, animaciones fluidas y una experiencia optimizada para productividad.
</p>

<ul class="mt-3 text-sm">
<li>• Organización inteligente</li>
<li>• Categorías automáticas</li>
<li>• UI moderna</li>
<li>• Optimizada para 4K</li>
</ul>

<button onclick="closeInfo()" class="btn mt-4">Cerrar</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
