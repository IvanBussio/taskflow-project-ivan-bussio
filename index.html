<div class="task-container">

  <input
    id="taskInput"
    type="text"
    placeholder="Add a new task..."
    aria-label="Task input"
  />

  <button id="addTaskButton">
    Add Task
  </button>

  <!-- Search -->
  <input
    type="text"
    id="searchTask"
    placeholder="Search tasks..."
  />

  <!-- Filters -->
  <div>

    <button id="filter-all">
      All
    </button>

    <button id="filter-completed">
      Completed
    </button>

    <button id="filter-pending">
      Pending
    </button>

  </div>

  <!-- Sort -->
  <button id="sortTasks">
    Sort A-Z
  </button>

  <!-- Task list -->
  <ul id="task-list"></ul>

</div>
