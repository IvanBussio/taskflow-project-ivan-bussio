<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TaskFlow</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:"Inter",sans-serif;
min-height:100vh;
display:flex;
justify-content:center;
padding:80px 20px;
transition:all .4s ease;
}

/* modo claro */

body.light{
background:
radial-gradient(circle at 20% 30%,#dbeafe,transparent 50%),
radial-gradient(circle at 80% 40%,#e9d5ff,transparent 50%),
#f1f5f9;
}

/* modo oscuro */

body.dark{
background:#020617;
color:#e2e8f0;
overflow:hidden;
}

/* estrellas */

body.dark::before{

content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background-image:
radial-gradient(white 1px,transparent 1px);

background-size:3px 3px;

opacity:.2;

animation:starsMove 60s linear infinite;

}

@keyframes starsMove{

from{transform:translateY(0);}
to{transform:translateY(-2000px);}

}

/* tarjetas */

.card{
background:rgba(255,255,255,.25);
backdrop-filter:blur(14px);
border-radius:14px;
box-shadow:0 8px 25px rgba(0,0,0,.08);
}

/* animación tareas */

.task-enter{
opacity:0;
transform:translateY(8px);
animation:fadeTask .3s ease forwards;
}

@keyframes fadeTask{
to{
opacity:1;
transform:translateY(0);
}
}

/* hover botones */

button{
transition:all .2s ease;
}

button:hover{
transform:translateY(-2px) scale(1.05);
box-shadow:0 6px 14px rgba(0,0,0,.15);
}

.completed{
text-decoration:line-through;
opacity:.5;
}

</style>

</head>

<body class="light">

<div id="themeToggle" class="fixed top-6 right-6 text-2xl cursor-pointer">
🌙
</div>

<div class="w-full max-w-xl space-y-6">

<h1 class="text-4xl font-bold text-center">TaskFlow</h1>

<!-- Crear tarea -->

<div class="card p-6 space-y-4">

<h2 class="font-semibold text-lg">Nueva tarea</h2>

<input
id="taskInput"
placeholder="Escribe una tarea..."
class="w-full p-2 rounded-lg border"
/>

<div class="flex gap-2 flex-wrap">

<button onclick="addTask()" class="bg-blue-500 text-white px-4 py-2 rounded-lg">
Añadir
</button>

<button onclick="completeAll()" class="bg-green-500 text-white px-4 py-2 rounded-lg">
Completar todas
</button>

<button onclick="deleteCompleted()" class="bg-red-500 text-white px-4 py-2 rounded-lg">
Borrar completadas
</button>

</div>

</div>

<!-- lista -->

<div class="card p-6 space-y-4">

<div class="flex gap-2">

<input
id="searchInput"
placeholder="Buscar tarea..."
class="flex-1 p-2 rounded-lg border"
/>

<button onclick="sortTasks()" class="bg-indigo-500 text-white px-4 py-2 rounded-lg">
Ordenar
</button>

</div>

<div class="flex gap-2">

<button onclick="setFilter('all')" class="bg-gray-300 px-3 py-1 rounded">
Todas
</button>

<button onclick="setFilter('pending')" class="bg-yellow-300 px-3 py-1 rounded">
Pendientes
</button>

<button onclick="setFilter('completed')" class="bg-green-300 px-3 py-1 rounded">
Completadas
</button>

</div>

<div id="stats" class="text-sm opacity-70"></div>

<div class="w-full bg-gray-300 rounded-full h-2 overflow-hidden">
<div id="progressBar" class="bg-green-500 h-full"></div>
</div>

<div id="taskList" class="space-y-3"></div>

</div>

</div>

<script>

let tasks=[];
let filter="all";

const taskInput=document.getElementById("taskInput");
const taskList=document.getElementById("taskList");
const searchInput=document.getElementById("searchInput");

/* STORAGE */

function saveTasks(){
localStorage.setItem("tasks",JSON.stringify(tasks));
}

function loadTasks(){

const saved=localStorage.getItem("tasks");

if(saved){
tasks=JSON.parse(saved);
}

}

loadTasks();

/* ADD */

function addTask(){

const title=taskInput.value.trim();

if(!title)return;

tasks.push({

id:Date.now(),
title,
completed:false

});

taskInput.value="";

saveTasks();
renderTasks();

}

/* RENDER */

function renderTasks(){

taskList.innerHTML="";

let filtered=[...tasks];

if(filter==="completed")
filtered=filtered.filter(t=>t.completed);

if(filter==="pending")
filtered=filtered.filter(t=>!t.completed);

const search=searchInput.value.toLowerCase();

filtered=filtered.filter(t=>t.title.toLowerCase().includes(search));

filtered.forEach(task=>{

const div=document.createElement("div");

div.className="task-enter flex justify-between items-center p-3 rounded bg-white/60";

if(task.completed)
div.classList.add("completed");

div.innerHTML=`

<span>${task.title}</span>

<div class="flex gap-2">

<button onclick="toggleTask(${task.id})">✔</button>

<button onclick="editTask(${task.id})">✏️</button>

<button onclick="deleteTask(${task.id})">🗑</button>

</div>

`;

taskList.appendChild(div);

});

updateStats();

}

/* TOGGLE */

function toggleTask(id){

tasks=tasks.map(t=>{
if(t.id===id)t.completed=!t.completed;
return t;
});

saveTasks();
renderTasks();

}

/* DELETE */

function deleteTask(id){

tasks=tasks.filter(t=>t.id!==id);

saveTasks();
renderTasks();

}

/* EDIT */

function editTask(id){

const task=tasks.find(t=>t.id===id);

const newTitle=prompt("Editar tarea",task.title);

if(newTitle){

task.title=newTitle;

saveTasks();
renderTasks();

}

}

/* COMPLETE ALL */

function completeAll(){

tasks=tasks.map(t=>({...t,completed:true}));

saveTasks();
renderTasks();

}

/* DELETE COMPLETED */

function deleteCompleted(){

tasks=tasks.filter(t=>!t.completed);

saveTasks();
renderTasks();

}

/* FILTER */

function setFilter(type){

filter=type;
renderTasks();

}

/* SEARCH */

searchInput.addEventListener("input",renderTasks);

/* SORT */

function sortTasks(){

tasks.sort((a,b)=>a.title.localeCompare(b.title));

saveTasks();
renderTasks();

}

/* STATS */

function updateStats(){

const total=tasks.length;
const completed=tasks.filter(t=>t.completed).length;

document.getElementById("stats").innerHTML=
`Completadas ${completed} de ${total}`;

const progress=total?completed/total*100:0;

document.getElementById("progressBar").style.width=progress+"%";

}

/* DARK MODE */

const toggle=document.getElementById("themeToggle");

function loadTheme(){

const saved=localStorage.getItem("theme");

if(saved){

document.body.className=saved;
toggle.textContent=saved==="dark"?"☀️":"🌙";

}else{

document.body.classList.add("light");

}

}

toggle.onclick=()=>{

if(document.body.classList.contains("light")){

document.body.classList.replace("light","dark");
toggle.textContent="☀️";
localStorage.setItem("theme","dark");

}else{

document.body.classList.replace("dark","light");
toggle.textContent="🌙";
localStorage.setItem("theme","light");

}

};

loadTheme();

renderTasks();

</script>

</body>
</html>
