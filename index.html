<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TaskFlow</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
  font-family:'Poppins',sans-serif;
  transition:background .6s;
}

/* claro */
body.light{
  background:linear-gradient(120deg,#d1fae5,#bbf7d0,#a7f3d0);
}

/* oscuro */
body.dark{
  background:linear-gradient(120deg,#0f172a,#1e1b4b,#312e81);
  color:white;
}

/* tarjetas */
.glass{
  background:rgba(255,255,255,.4);
  backdrop-filter:blur(14px);
  border-radius:18px;
  padding:25px;
}

/* botones */
.btn{
  padding:10px 18px;
  border-radius:10px;
  background:rgba(255,255,255,.5);
}

/* tareas */
.task{
  background:rgba(255,255,255,.6);
  padding:14px;
  border-radius:12px;
  display:flex;
  justify-content:space-between;
}

/* progreso */
.progress{
  height:6px;
  background:rgba(255,255,255,.3);
  border-radius:6px;
}

.progressbar{
  height:100%;
  background:#34d399;
}
</style>
</head>

<body class="light min-h-screen flex flex-col items-center px-4 py-6">

<header class="w-full max-w-4xl flex justify-between items-center mb-8">

<div class="flex gap-2">
<button onclick="openWelcome()" class="btn">ℹ Info</button>
<button onclick="toggleTheme()" class="btn">🌙</button>
</div>

<h1 class="text-4xl font-semibold">TaskFlow</h1>

</header>

<div class="glass w-full max-w-3xl mb-6">

<h2>Nueva tarea</h2>

<input id="taskInput" class="w-full p-2 rounded mb-3 text-black" placeholder="Nueva tarea...">

<div class="flex gap-2">
<button onclick="addTask()" class="btn">Añadir</button>
<button onclick="sortTasks()" class="btn">Ordenar A-Z</button>
</div>

<p id="taskCount" class="mt-2 text-sm"></p>

<div class="progress mt-2">
<div id="progressBar" class="progressbar"></div>
</div>

</div>

<div class="glass w-full max-w-3xl">
<div id="taskList"></div>
</div>

<div id="welcomeModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center">
<div class="bg-white p-6 rounded">
<h2>Bienvenido a TaskFlow</h2>
<button onclick="closeWelcome()" class="btn mt-3">Cerrar</button>
</div>
</div>

<script src="script.js"></script>

</body>
</html>
