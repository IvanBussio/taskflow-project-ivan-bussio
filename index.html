<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TaskFlow</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = { darkMode: "class" }
</script>

<style>

body{
font-family:"Inter",sans-serif;
min-height:100vh;
display:flex;
justify-content:center;
padding:60px 20px;
transition:all 0.4s ease;
}

/* pastel background */

body.light{
background:
radial-gradient(circle at 20% 30%, #ffe4ec, transparent 50%),
radial-gradient(circle at 80% 40%, #e0f2ff, transparent 50%),
radial-gradient(circle at 50% 90%, #f3e8ff, transparent 50%),
#f8fafc;
}

/* dark background */

body.dark{
background:
radial-gradient(circle at 20% 30%, #0ea5e9, transparent 50%),
radial-gradient(circle at 80% 40%, #6366f1, transparent 50%),
radial-gradient(circle at 50% 90%, #9333ea, transparent 50%),
#020617;
}

.task-enter{
opacity:0;
transform:translateY(10px);
animation:taskAppear .3s ease forwards;
}

@keyframes taskAppear{
to{
opacity:1;
transform:translateY(0);
}
}

.completed{
text-decoration:line-through;
color:#ef4444;
}

</style>

</head>

<body class="light">

<div id="themeToggle" class="fixed top-6 right-6 text-2xl cursor-pointer">
🌙
</div>

<div class="w-full max-w-xl space-y-6">

<h1 class="text-4xl font-bold mb-6">TaskFlow</h1>

<!-- crear tarea -->

<div class="bg-white/70 backdrop-blur-lg p-6 rounded-xl shadow">

<label for="taskInput" class="block mb-2 font-medium">
Nueva tarea
</label>

<input
id="taskInput"
placeholder="Escribe una tarea..."
class="w-full border rounded p-2 mb-3"
/>

<div class="flex gap-2 flex-wrap">

<button id="addTaskBtn" class="bg-indigo-500 text-white px-4 py-2 rounded">
Añadir
</button>

<button id="completeAllBtn" class="bg-emerald-500 text-white px-4 py-2 rounded">
Completar todas
</button>

<button id="clearCompletedBtn" class="bg-rose-500 text-white px-4 py-2 rounded">
Borrar completadas
</button>

</div>

</div>

<!-- lista -->

<div class="bg-white/70 backdrop-blur-lg p-6 rounded-xl shadow">

<div class="flex justify-between mb-3">

<input
id="searchInput"
placeholder="Buscar tarea..."
class="border rounded p-2 w-2/3"
/>

<button id="sortBtn" class="bg-indigo-400 text-white px-3 py-1 rounded">
Ordenar
</button>

</div>

<div class="flex gap-2 mb-3">

<button id="filterAll" class="bg-gray-300 px-2 py-1 rounded">
Todas
</button>

<button id="filterPending" class="bg-yellow-300 px-2 py-1 rounded">
Pendientes
</button>

<button id="filterDone" class="bg-emerald-300 px-2 py-1 rounded">
Completadas
</button>

</div>

<div id="taskStats" class="text-sm mb-2"></div>

<div class="w-full bg-gray-300 rounded h-3 mb-3">
<div id="progressBar" class="bg-emerald-500 h-3 rounded" style="width:0%"></div>
</div>

<ul id="taskList" class="space-y-2"></ul>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
