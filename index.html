<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TaskFlow</title>
<link rel="stylesheet" href="output.css">
</head>

<body class="bg-gray-900 text-white min-h-screen p-10">

<h1 class="text-4xl font-bold mb-8 text-blue-400">TaskFlow 🚀</h1>

<div class="max-w-xl">

<div class="flex gap-2 mb-6">
<input id="taskInput" type="text"
placeholder="Nueva tarea..."
class="flex-1 p-3 rounded-lg bg-gray-800 border border-gray-700">

<button onclick="addTask()"
class="bg-blue-500 hover:bg-blue-600 px-4 py-2 rounded-lg">
Agregar
</button>
</div>

<ul id="taskList" class="space-y-3"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
