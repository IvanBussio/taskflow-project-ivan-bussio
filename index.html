<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TaskFlow PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* RESET */
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  transition:.4s;
}

/* 🌌 DARK */
body.dark{
  background: linear-gradient(135deg,#0B0A18,#1A1235,#2A1A5A);
  background-size:400% 400%;
  animation:bg 12s ease infinite;
  color:#E5E7EB;
}

/* 🌸 LIGHT */
body.light{
  background: linear-gradient(135deg,#FFD6E0,#E0F2FE);
  background-size:400% 400%;
  animation:bg 12s ease infinite;
}

@keyframes bg{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  padding:20px 60px;
}

.title{
  font-size:34px;
  font-weight:600;
  background:linear-gradient(90deg,#ff7eb3,#6ec3ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* BOTONES */
.btn{
  padding:10px 16px;
  border-radius:12px;
  border:none;
  cursor:pointer;
  background:rgba(255,255,255,0.08);
  color:white;
  border:1px solid rgba(255,255,255,0.15);
  transition:.3s;
}

.btn:hover{
  background:rgba(255,255,255,0.18);
  transform:translateY(-2px);
}

/* CONTENEDOR */
.container{
  max-width:1500px;
  margin:auto;
  padding:0 40px;
}

/* GRID */
.layout{
  display:grid;
  grid-template-columns:1fr;
  gap:30px;
}

@media(min-width:1200px){
  .layout{
    grid-template-columns:1fr 1.2fr;
  }
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  padding:25px;
  border-radius:20px;
  backdrop-filter:blur(12px);
}

body.light .card{
  background:rgba(255,255,255,0.7);
  border:1px solid rgba(0,0,0,0.05);
}

/* 🔥 INPUT PREMIUM */
.input{
  width:100%;
  padding:16px;
  border-radius:14px;
  margin-bottom:14px;
  box-sizing:border-box;
  border:1px solid transparent;
  outline:none;
  transition:all .25s ease;
}

/* DARK INPUT */
body.dark .input{
  background:rgba(255,255,255,0.06);
  color:white;
}

/* LIGHT INPUT */
body.light .input{
  background:#F1F5F9;
  border:1px solid #E2E8F0;
}

/* ✨ FOCUS PRO */
.input:focus{
  border:1px solid #8B5CF6;
  box-shadow:0 0 0 3px rgba(139,92,246,0.2);
  transform:scale(1.01);
}

/* Placeholder */
.input::placeholder{
  color:#94A3B8;
  transition:.2s;
}

.input:focus::placeholder{
  opacity:0.5;
}

/* DASHBOARD */
.dashboard{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.dashboard-card{
  flex:1;
  padding:18px;
  border-radius:16px;
  text-align:center;
  font-weight:600;
}

.total{ 
  background:linear-gradient(135deg,#93C5FD,#BFDBFE);
  color:#1E3A8A;
}

.completed{ 
  background:linear-gradient(135deg,#86EFAC,#BBF7D0);
  color:#065F46;
}

.pending{ 
  background:linear-gradient(135deg,#F9A8D4,#FBCFE8);
  color:#831843;
}

/* TAREAS */
.task{
  display:flex;
  justify-content:space-between;
  padding:14px;
  border-radius:14px;
  margin-bottom:10px;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(10px);
}

body.light .task{
  background:white;
}

.task .completed{
  text-decoration:line-through;
  opacity:.5;
  color:#9CA3AF;
}

/* CATEGORIAS PASTEL */
.chip{
  padding:6px 14px;
  border-radius:999px;
  font-size:12px;
  font-weight:500;
}

.cat-Trabajo{background:#BFDBFE;color:#1E3A8A;}
.cat-Personal{background:#BBF7D0;color:#065F46;}
.cat-Compras{background:#FED7AA;color:#7C2D12;}
.cat-Estudio{background:#E9D5FF;color:#4C1D95;}
.cat-Gym{background:#FECACA;color:#7F1D1D;}

footer{
  margin-top:40px;
  padding:20px;
  text-align:center;
  opacity:0.7;
}

</style>

</head>

<body class="dark">

<header>

<h1 class="title">TaskFlow</h1>

<div>
<button class="btn" onclick="toggleTheme()" id="themeBtn">☀️</button>
</div>

</header>

<main class="container layout">

<div class="card">

<input id="input" class="input" placeholder="Nueva tarea...">
<input id="categoryInput" class="input" placeholder="Categoría automática...">

<button class="btn" onclick="addTask()">Añadir</button>
<button class="btn" onclick="sortTasks()">Ordenar A-Z</button>
<button class="btn" onclick="deleteAll()">Eliminar todo</button>

</div>

<div>
<div id="dashboard" class="dashboard"></div>
<div id="taskList"></div>
</div>

</main>

<footer>
© 2026 TaskFlow — Ivan Bussio
</footer>

<script src="script.js"></script>

</body>
</html>
