<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
font-family:'Poppins',sans-serif;
transition:background .6s;
}

/* MODO CLARO */
body.light{
background:linear-gradient(120deg,#a8e6cf,#dcedc1,#ffd3b6);
background-size:300% 300%;
animation:bgmove 20s infinite alternate;
}

/* MODO OSCURO */
body.dark{
background:linear-gradient(120deg,#020617,#0f172a,#1e293b);
background-size:300% 300%;
animation:bgmove 20s infinite alternate;
color:white;
}

@keyframes bgmove{
0%{background-position:0% 50%;}
100%{background-position:100% 50%;}
}

/* TARJETAS */
.glass{
background:rgba(255,255,255,.35);
backdrop-filter:blur(14px);
border-radius:18px;
padding:25px;
box-shadow:0 15px 35px rgba(0,0,0,.15);
}

.dark .glass{
background:rgba(30,41,59,.7);
}

/* BOTONES */
.btn{
padding:10px 18px;
border-radius:10px;
background:rgba(255,255,255,.4);
transition:.25s;
}

.btn:hover{
transform:translateY(-3px);
background:rgba(255,255,255,.65);
}

.dark .btn{
background:rgba(255,255,255,.1);
}

/* TAREAS */
.task{
background:rgba(255,255,255,.55);
padding:14px;
border-radius:12px;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.dark .task{
background:rgba(30,41,59,.7);
}

.task span{
font-weight:500;
}

/* PROGRESO */
.progress{
height:8px;
border-radius:6px;
background:rgba(255,255,255,.4);
}

.progressbar{
height:8px;
border-radius:6px;
background:#34d399;
}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.55);
display:flex;
align-items:center;
justify-content:center;
}

.modal-box{
background:white;
padding:40px;
border-radius:20px;
max-width:500px;
text-align:center;
}

.dark .modal-box{
background:#1e293b;
color:white;
}

</style>

</head>

<body class="light min-h-screen flex flex-col items-center px-4 py-6">

<!-- HEADER -->
<header class="w-full max-w-3xl flex justify-between items-center mb-8">

<!-- IZQUIERDA -->
<div class="flex gap-2">
<button onclick="openWelcome()" class="btn">ℹ</button>
<button id="themeToggle" class="btn">🌙</button>
</div>

<!-- DERECHA -->
<h1 class="text-4xl font-semibold">TaskFlow</h1>

</header>

<!-- CREAR TAREA -->
<div class="glass w-full max-w-3xl mb-6">

<h2 class="text-xl mb-3">Nueva tarea</h2>

<input id="taskInput" placeholder="Escribe una tarea..." class="w-full p-2 rounded mb-3 text-black"/>

<div class="flex gap-2 flex-wrap">
<button onclick="addTask()" class="btn">Añadir</button>
<button onclick="completeAll()" class="btn">Completar todas</button>
<button onclick="deleteCompleted()" class="btn">Borrar completadas</button>
</div>

</div>

<!-- LISTA -->
<div class="glass w-full max-w-3xl">

<input id="search" placeholder="Buscar..." class="w-full p-2 rounded mb-3 text-black"/>

<button onclick="sortTasks()" class="btn mb-3">Ordenar</button>

<p id="stats" class="text-sm mb-2"></p>

<div class="progress mb-4">
<div id="progressBar" class="progressbar"></div>
</div>

<div id="taskList"></div>

</div>

<!-- MODAL -->
<div id="welcomeModal" class="modal hidden">

<div class="modal-box">

<h2 class="text-3xl mb-4">Bienvenido a TaskFlow</h2>

<p>
Organiza tus tareas de forma simple y visual.
</p>

<button onclick="closeWelcome()" class="btn mt-6">Cerrar</button>

</div>

</div>

<script>

let tasks = []

function addTask(){
const input = document.getElementById("taskInput")
if(!input.value) return

tasks.push({text:input.value,done:false})
input.value=""
render()
}

function render(){
const list = document.getElementById("taskList")
list.innerHTML=""

let completed=0

tasks.forEach((t,i)=>{
if(t.done) completed++

const div=document.createElement("div")
div.className="task"

div.innerHTML=`
<span style="${t.done?'text-decoration:line-through':''}">${t.text}</span>
<div>
<button onclick="toggle(${i})">✔</button>
<button onclick="removeTask(${i})">❌</button>
</div>
`

list.appendChild(div)
})

document.getElementById("stats").innerText=`${completed}/${tasks.length} completadas`

document.getElementById("progressBar").style.width = tasks.length ? (completed/tasks.length*100)+"%" : "0%"
}

function toggle(i){
tasks[i].done=!tasks[i].done
render()
}

function removeTask(i){
tasks.splice(i,1)
render()
}

function completeAll(){
tasks.forEach(t=>t.done=true)
render()
}

function deleteCompleted(){
tasks=tasks.filter(t=>!t.done)
render()
}

function sortTasks(){
tasks.sort((a,b)=>a.text.localeCompare(b.text))
render()
}

/* MODO OSCURO */
document.getElementById("themeToggle").onclick=()=>{
document.body.classList.toggle("dark")
document.body.classList.toggle("light")
}

/* MODAL */
function openWelcome(){
document.getElementById("welcomeModal").classList.remove("hidden")
}

function closeWelcome(){
document.getElementById("welcomeModal").classList.add("hidden")
}

</script>

</body>
</html>
