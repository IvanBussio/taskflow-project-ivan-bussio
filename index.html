<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter', sans-serif;
}

/* 🌈 FONDO ANIMADO */
.animated-bg{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
  background:linear-gradient(135deg,#ffd6e0,#cce5ff);
}

.animated-bg svg{
  width:100%;
  height:100%;
}

.animated-bg path{
  fill:none;
  stroke:rgba(0,0,0,0.08);
  stroke-width:2;
  stroke-dasharray:1000;
  stroke-dashoffset:1000;
  animation:draw 6s linear infinite;
}

.animated-bg path:nth-child(2){animation-delay:1s;}
.animated-bg path:nth-child(3){animation-delay:2s;}

@keyframes draw{
  0%{stroke-dashoffset:1000;}
  50%{stroke-dashoffset:0;}
  100%{stroke-dashoffset:-1000;}
}

/* 🌙 DARK MODE */
body.dark{
  background:#0f172a;
  color:white;
}

body.dark .animated-bg{
  background:linear-gradient(135deg,#0f172a,#1e293b);
}

body.dark .animated-bg path{
  stroke:rgba(255,255,255,0.08);
}

/* 📦 CONTENEDOR */
.container{
  max-width:400px;
  margin:40px auto;
  padding:20px;
  border-radius:20px;
  backdrop-filter:blur(15px);
  background:rgba(255,255,255,0.7);
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

body.dark .container{
  background:rgba(30,41,59,0.7);
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
}

.header h1{
  font-size:22px;
}

.header button{
  border:none;
  background:none;
  font-size:18px;
  cursor:pointer;
}

/* INPUTS */
input, select{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid #ccc;
  outline:none;
}

/* BOTONES */
.buttons{
  display:flex;
  gap:10px;
  margin-top:10px;
}

button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:500;
}

.add-btn{ background:#3b82f6; color:white; }
.sort-btn{ background:#a855f7; color:white; }

/* LISTA */
.task{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#f1f5f9;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

body.dark .task{
  background:#334155;
}

.task span{
  font-size:14px;
}

.task small{
  display:block;
  opacity:0.6;
}

.task button{
  background:none;
  border:none;
  cursor:pointer;
  font-size:16px;
}
</style>
</head>

<body>

<!-- 🎨 FONDO -->
<div class="animated-bg">
  <svg viewBox="0 0 800 600">
    <path d="M10 100 Q 200 50 400 150 T 800 100"/>
    <path d="M0 300 Q 300 200 600 350 T 800 300"/>
    <path d="M50 500 Q 250 400 500 550 T 800 500"/>
  </svg>
</div>

<div class="container">

  <div class="header">
    <h1>TaskFlow</h1>
    <button id="toggleTheme">🌙</button>
  </div>

  <!-- BUSCADOR -->
  <input id="search" placeholder="Buscar...">

  <!-- NUEVA TAREA -->
  <input id="taskInput" placeholder="Nueva tarea...">

  <!-- CATEGORÍAS -->
  <input id="newCategory" placeholder="Nueva categoría...">
  <button onclick="addCategory()">+ Categoría</button>

  <select id="categorySelect"></select>

  <!-- BOTONES -->
  <div class="buttons">
    <button class="add-btn" onclick="addTask()">Añadir</button>
    <button class="sort-btn" onclick="sortTasks()">Ordenar</button>
  </div>

  <!-- LISTA -->
  <div id="taskList"></div>

</div>

<script>

/* 🌙 DARK MODE */
document.getElementById("toggleTheme").onclick = () => {
  document.body.classList.toggle("dark");
};

/* 📂 CATEGORÍAS */
let categories = ["General"];

function renderCategories(){
  const select = document.getElementById("categorySelect");
  select.innerHTML = "";
  categories.forEach(cat=>{
    const option = document.createElement("option");
    option.value = cat;
    option.textContent = cat;
    select.appendChild(option);
  });
}

function addCategory(){
  const input = document.getElementById("newCategory");
  if(!input.value.trim()) return;

  categories.push(input.value.trim());
  input.value = "";
  renderCategories();
}

renderCategories();

/* 📋 TAREAS */
let tasks = [];

function addTask(){
  const input = document.getElementById("taskInput");
  const category = document.getElementById("categorySelect").value;

  if(!input.value.trim()) return;

  tasks.push({
    text: input.value,
    category,
    completed:false
  });

  input.value="";
  renderTasks();
}

function renderTasks(){
  const list = document.getElementById("taskList");
  const search = document.getElementById("search").value.toLowerCase();

  list.innerHTML="";

  tasks
    .filter(t => t.text.toLowerCase().includes(search))
    .forEach((task,index)=>{
      const div = document.createElement("div");
      div.className="task";

      div.innerHTML = `
        <div>
          <span style="${task.completed ? 'text-decoration:line-through;' : ''}">
            ${task.text}
          </span>
          <small>${task.category}</small>
        </div>
        <div>
          <button onclick="toggleTask(${index})">✔️</button>
          <button onclick="deleteTask(${index})">🗑️</button>
        </div>
      `;

      list.appendChild(div);
    });
}

function toggleTask(i){
  tasks[i].completed = !tasks[i].completed;
  renderTasks();
}

function deleteTask(i){
  tasks.splice(i,1);
  renderTasks();
}

/* 🔤 ORDENAR */
function sortTasks(){
  tasks.sort((a,b)=>a.text.localeCompare(b.text));
  renderTasks();
}

/* 🔎 BUSCADOR */
document.getElementById("search").addEventListener("input", renderTasks);

/* ⌨️ ENTER */
document.getElementById("taskInput").addEventListener("keypress", e=>{
  if(e.key==="Enter") addTask();
});

</script>

</body>
</html>
