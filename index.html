<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TaskFlow Pro</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
min-height:100vh;

background:linear-gradient(
to bottom,
#2e3b6b,
#344c8c,
#2f6f7d,
#2a8a6b
);

color:white;
text-align:center;
}

h1{
margin-top:40px;
font-size:42px;
}

.subtitle{
opacity:0.8;
margin-bottom:30px;
}

/* stats */

.stats{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:20px;
}

.card{
background:rgba(255,255,255,0.2);
padding:20px;
border-radius:12px;
width:140px;
}

/* progress */

.progress-container{
width:70%;
height:10px;
background:rgba(255,255,255,0.3);
margin:20px auto;
border-radius:10px;
overflow:hidden;
}

.progress-bar{
height:100%;
width:0%;
background:#4dabf7;
transition:0.3s;
}

#progressText{
margin-bottom:30px;
}

/* board */

.board{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
padding-bottom:50px;
}

.column{
background:rgba(255,255,255,0.15);
padding:20px;
border-radius:15px;
width:250px;
min-height:300px;
}

.column h3{
margin-top:0;
}

.task{
background:white;
color:black;
padding:10px;
border-radius:8px;
margin-top:10px;
cursor:pointer;
}

/* input */

.input-area{
margin:20px;
}

input{
padding:10px;
border:none;
border-radius:8px;
width:200px;
}

button{
padding:10px 16px;
border:none;
border-radius:8px;
background:#4dabf7;
color:white;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

</style>
</head>


<body>

<h1>TaskFlow Pro</h1>
<p class="subtitle">Organize your work with a modern Kanban board</p>

<div class="stats">

<div class="card">
<p>Total Tasks</p>
<h2 id="totalTasks">0</h2>
</div>

<div class="card">
<p>Completed</p>
<h2 id="completedTasks">0</h2>
</div>

<div class="card">
<p>In Progress</p>
<h2 id="progressTasks">0</h2>
</div>

</div>


<div class="progress-container">
<div class="progress-bar" id="progressBar"></div>
</div>

<p id="progressText">0% Completed</p>


<div class="input-area">
<input id="taskInput" placeholder="New task">
<button onclick="addTask()">Add</button>
</div>


<div class="board">

<div class="column">
<h3>📌 TO DO</h3>
<div id="todo"></div>
</div>

<div class="column">
<h3>⚙️ IN PROGRESS</h3>
<div id="progress"></div>
</div>

<div class="column">
<h3>✅ DONE</h3>
<div id="done"></div>
</div>

</div>


<script>

function addTask(){

const input=document.getElementById("taskInput")
const text=input.value

if(text==="") return

const task=document.createElement("div")
task.className="task"
task.innerText=text

task.onclick=function(){

if(task.parentElement.id==="todo"){

document.getElementById("progress").appendChild(task)

}else if(task.parentElement.id==="progress"){

document.getElementById("done").appendChild(task)

}

updateStats()

}

document.getElementById("todo").appendChild(task)

input.value=""

updateStats()

}



function updateStats(){

const todo=document.querySelectorAll("#todo .task").length
const progress=document.querySelectorAll("#progress .task").length
const done=document.querySelectorAll("#done .task").length

const total=todo+progress+done

document.getElementById("totalTasks").innerText=total
document.getElementById("completedTasks").innerText=done
document.getElementById("progressTasks").innerText=progress

let percent=0

if(total>0){

percent=Math.round((done/total)*100)

}

document.getElementById("progressBar").style.width=percent+"%"
document.getElementById("progressText").innerText=percent+"% Completed"

}

</script>

</body>
</html>
