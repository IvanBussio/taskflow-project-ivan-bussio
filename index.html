<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TaskFlow PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
  font-family:'Poppins',sans-serif;
  overflow-x:hidden;
}

/* 🌿 claro */
body.light{
  background:#ecfdf5;
}

/* 🌌 oscuro */
body.dark{
  background:#0f172a;
  color:white;
}

/* ✏️ LÍNEAS LÁPIZ ANIMADAS */
.canvas-bg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}

/* glass */
.glass{
  background:rgba(255,255,255,.5);
  backdrop-filter:blur(12px);
  border-radius:20px;
  padding:25px;
}

/* botones */
.btn{
  padding:10px 16px;
  border-radius:10px;
  background:rgba(255,255,255,.6);
  transition:all .25s ease;
}

/* ✨ HOVER PRO */
.btn:hover{
  transform:translateY(-3px) scale(1.05);
  box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

/* tareas */
.task{
  background:rgba(255,255,255,.7);
  padding:12px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  margin-top:10px;
  transition:.2s;
}

.task:hover{
  transform:scale(1.02);
}

/* chip */
.chip{
  background:#34d399;
  color:white;
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
}

/* modal */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:flex;
  align-items:center;
  justify-content:center;
}

.modal-box{
  background:white;
  padding:30px;
  border-radius:20px;
  max-width:500px;
}

.dark .modal-box{
  background:#1e293b;
  color:white;
}

</style>
</head>

<body class="light px-6 py-6">

<canvas id="bgCanvas" class="canvas-bg"></canvas>

<header class="flex justify-between items-center mb-10">

<h1 class="text-4xl font-semibold">TaskFlow</h1>

<div class="flex gap-2">
<button onclick="openInfo()" class="btn">ℹ</button>
<button onclick="toggleTheme()" class="btn">🌙</button>
</div>

</header>

<div class="glass max-w-5xl mx-auto mb-6">

<input id="taskInput" placeholder="Tarea..." class="w-full p-2 rounded mb-2 text-black">
<input id="categoryInput" placeholder="Categoría..." class="w-full p-2 rounded mb-2 text-black">

<div id="suggestions"></div>

<div class="flex gap-2 mt-2">
<button onclick="addTask()" class="btn">Añadir</button>
<button onclick="sortTasks()" class="btn">Ordenar</button>
</div>

</div>

<div class="glass max-w-5xl mx-auto">
<div id="taskList"></div>
</div>

<!-- MODAL INFO -->
<div id="infoModal" class="modal hidden" onclick="closeInfo(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <h2 class="text-2xl mb-3">TaskFlow PRO</h2>
    <p>
      TaskFlow es una aplicación avanzada de gestión de tareas diseñada para mejorar tu productividad.
    </p>

    <ul class="mt-3 text-sm">
      <li>• Organización por categorías inteligentes</li>
      <li>• Interfaz moderna y fluida</li>
      <li>• Sistema de sugerencias automático</li>
      <li>• Optimizada para pantallas grandes (4K)</li>
    </ul>

    <button onclick="closeInfo()" class="btn mt-4">Cerrar</button>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
