<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TaskFlow PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
  font-family:'Poppins',sans-serif;
  margin:0;
  transition:0.4s;
  overflow-x:hidden;
}

/* 🌸 CLARO */
body.light{
  background:linear-gradient(135deg,#ffd6e0,#cde7ff);
}

/* 🌌 OSCURO */
body.dark{
  background:linear-gradient(135deg,#0a0a0f,#1a0933,#2a0a4a);
  color:white;
}

/* ✏️ FONDO ANIMADO */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
}

.bg::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:repeating-linear-gradient(
    to right,
    transparent,
    transparent 40px,
    rgba(255,255,255,0.05) 42px
  );
  animation:move 8s linear infinite;
}

@keyframes move{
  from{transform:translateX(0)}
  to{transform:translateX(60px)}
}

/* header */
header{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
}

/* título */
.title{
  font-size:32px;
  font-weight:600;
  background:linear-gradient(90deg,#ff7eb3,#6ec3ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* botones */
.btn{
  padding:8px 14px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  transition:.3s;
}

.btn:hover{
  transform:scale(1.1);
  box-shadow:0 10px 25px rgba(0,0,0,.3);
}

/* contenedor */
.container{
  max-width:600px;
  margin:auto;
}

/* tarjeta */
.card{
  background:rgba(255,255,255,0.5);
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
}

.dark .card{
  background:rgba(30,30,60,0.6);
}

/* inputs */
.input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-bottom:10px;
  box-sizing:border-box;
}

/* tareas */
.task{
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-radius:10px;
  margin-bottom:8px;
  background:rgba(255,255,255,0.6);
}

.dark .task{
  background:#1e1e3f;
}

.completed{
  text-decoration:line-through;
  opacity:.6;
}

/* chips */
.chip{
  padding:3px 8px;
  border-radius:8px;
  font-size:12px;
  color:white;
}

.cat-Trabajo{background:#3b82f6;}
.cat-Personal{background:#10b981;}
.cat-Compras{background:#f59e0b;}
.cat-Estudio{background:#8b5cf6;}
.cat-Gym{background:#ef4444;}

/* modal */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:flex;
  align-items:center;
  justify-content:center;
}

.modal-box{
  background:white;
  padding:25px;
  border-radius:15px;
  max-width:400px;
  text-align:center;
}

.dark .modal-box{
  background:#1e1e3f;
  color:white;
}

</style>
</head>

<body class="light">

<div class="bg"></div>

<header>

<h1 class="title">TaskFlow</h1>

<div>
<button class="btn" onclick="openInfo()">i</button>
<button class="btn" onclick="toggleTheme()">🌙</button>
</div>

</header>

<main class="container">

<div class="card">

<input id="input" class="input" placeholder="Nueva tarea...">
<input id="categoryInput" class="input" placeholder="Categoría automática...">

<button class="btn" onclick="addTask()">Añadir</button>
<button class="btn" onclick="sortTasks()">Ordenar A-Z</button>
<button class="btn" onclick="deleteAll()">Eliminar todo</button>

</div>

<div id="taskList"></div>

</main>

<!-- INFO -->
<div id="infoModal" class="modal" style="display:none" onclick="closeInfo(event)">
  <div class="modal-box">
    <h2>TaskFlow 🚀</h2>
    <p>
      Organiza tus tareas de forma inteligente.<br><br>
      ✔ Categorías automáticas<br>
      ✔ Gestión rápida<br>
      ✔ Interfaz moderna<br><br>
      Mejora tu productividad diaria.
    </p>
  </div>
</div>

<!-- WELCOME -->
<div id="welcome" class="modal" style="display:none">
  <div class="modal-box">
    <h2>Bienvenido 👋</h2>
    <p>Empieza a organizar tu día como un pro.</p>
    <button class="btn" onclick="closeWelcome()">Entrar</button>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
