<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
</head>

<body class="min-h-screen flex items-center justify-center 
bg-gradient-to-br from-black via-gray-900 to-black">

  <!-- INFO -->
  <button onclick="showInfo()" 
    class="absolute top-6 left-6 text-white text-xl hover:scale-110 transition">
    ℹ️
  </button>

  <!-- CONTAINER -->
  <div class="w-full max-w-5xl 2xl:max-w-6xl p-8 md:p-10 lg:p-12 
  bg-gray-100 dark:bg-gray-800 rounded-3xl shadow-2xl transition">

    <!-- HEADER -->
    <div class="text-center mb-8">
      <h1 class="text-2xl md:text-3xl lg:text-4xl font-bold text-gray-800 dark:text-white">
        TaskFlow
      </h1>
      <p class="text-sm md:text-base lg:text-lg text-gray-600 dark:text-gray-300">
        Organiza tu día 🚀
      </p>
    </div>

    <!-- INPUT -->
    <div class="flex gap-3 mb-4">
      <input id="taskInput" type="text" placeholder="Agregar tarea..."
        class="flex-1 px-4 py-3 md:py-4 text-base md:text-lg rounded-xl border 
        bg-white dark:bg-gray-700 text-gray-800 dark:text-white"/>

      <button id="addBtn"
        class="px-4 py-2 md:px-5 md:py-3 text-base md:text-lg rounded-xl 
        bg-green-500 text-white hover:bg-green-600 transition">
        +
      </button>
    </div>

    <!-- CONTROLES -->
    <div class="flex justify-between items-center mb-6">

      <div class="flex gap-2">
        <input id="searchInput" placeholder="Buscar..."
          class="px-3 py-2 rounded-lg bg-white dark:bg-gray-700 text-black dark:text-white"/>

        <button id="sortBtn" class="text-blue-400">Ordenar</button>
      </div>

      <div class="flex gap-4">
        <button onclick="clearCompleted()" class="text-red-500">
          Eliminar completadas
        </button>

        <button id="themeBtn" class="text-yellow-400">
          🌙
        </button>
      </div>

    </div>

    <!-- LISTA -->
    <div id="taskList" class="space-y-3 md:space-y-4"></div>

  </div>

  <script src="./js/app.js"></script>

</body>
</html>
