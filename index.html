<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taskflow</title>

<style>
:root {
--bg-color: #f1f5f9;
--primary: #1e3a8a;
--primary-light: #3b82f6;
--card: #ffffff;
--text: #0f172a;
--muted: #64748b;
--spacing: 20px;
--radius: 14px;
}

body{
display:flex;
min-height:100vh;
background:var(--bg-color);
font-family:Arial;
}

aside{
width:260px;
background:linear-gradient(180deg,var(--primary),var(--primary-light));
color:white;
padding:20px;
}

main{
flex:1;
padding:40px;
}

#task-form{
margin-bottom:20px;
}

#task-input{
padding:10px;
width:250px;
}

button{
padding:10px;
cursor:pointer;
}

#search{
margin-bottom:20px;
padding:10px;
width:250px;
}

#task-list{
list-style:none;
display:flex;
flex-direction:column;
gap:10px;
}

#task-list li{
background:white;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
border-radius:8px;
}
</style>
</head>

<body>

<aside>
<h2>Categorías</h2>
<p>Trabajo</p>
<p>Personal</p>
<p>Urgente</p>
</aside>

<main>

<h1>Lista de Tareas (<span id="task-count">0</span>)</h1>

<form id="task-form">
<input type="text" id="task-input" placeholder="Escribe una tarea..." required>
<button type="submit">Añadir</button>
</form>

<input type="text" id="search" placeholder="Buscar tarea...">

<ul id="task-list"></ul>

</main>

<script src="js/app.js"></script>

</body>
</html>
