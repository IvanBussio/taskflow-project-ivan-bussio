<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TaskFlow</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
}

.gradient{
background:linear-gradient(135deg,#1e3a8a,#6d28d9);
}

.darkmode{
background:#0f172a;
}

</style>

</head>

<body class="gradient min-h-screen flex flex-col items-center p-6 text-white transition-all">

<!-- HEADER -->

<div class="flex justify-between items-center w-full max-w-md mb-6">

<h1 class="text-4xl font-semibold">
TaskFlow
</h1>

<button id="modeBtn" class="text-2xl">
🌙
</button>

</div>

<p class="mb-6 opacity-80">
Bienvenido a TaskFlow
</p>

<!-- ADD TASK -->

<div class="bg-white/10 backdrop-blur-lg rounded-2xl p-6 w-full max-w-md mb-6">

<input 
id="taskInput"
placeholder="Nueva tarea..."
class="w-full p-3 rounded-xl text-black mb-4"
/>

<button
id="addBtn"
class="bg-blue-500 hover:bg-blue-600 w-full p-3 rounded-xl">
Añadir tarea
</button>

</div>

<!-- FILTER -->

<div class="bg-white/10 backdrop-blur-lg rounded-2xl p-6 w-full max-w-md">

<!-- SEARCH -->

<div class="flex gap-2 mb-4 w-full">

<input
id="searchInput"
placeholder="Buscar tarea..."
class="flex-1 min-w-0 p-2 rounded-lg text-black"
/>

<button
id="sortBtn"
class="shrink-0 bg-white text-black px-4 rounded-lg">
Ordenar
</button>

</div>

<!-- FILTER BUTTONS -->

<div class="flex gap-2 mb-4">

<button id="allBtn" class="flex-1 bg-gray-200 text-black rounded-lg p-2">
Todas
</button>

<button id="pendingBtn" class="flex-1 bg-blue-500 rounded-lg p-2">
Pendientes
</button>

<button id="doneBtn" class="flex-1 bg-purple-500 rounded-lg p-2">
Completadas
</button>

</div>

<p id="counter" class="mb-4 opacity-80">
Completadas 0 de 0
</p>

<ul id="taskList" class="space-y-3"></ul>

</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || []

const input = document.getElementById("taskInput")
const list = document.getElementById("taskList")
const counter = document.getElementById("counter")
const search = document.getElementById("searchInput")

let filter = "all"

function save(){

localStorage.setItem("tasks",JSON.stringify(tasks))

}

function render(){

list.innerHTML=""

let filtered = tasks.filter(t=>{

if(filter==="pending") return !t.done
if(filter==="done") return t.done
return true

})

filtered = filtered.filter(t=>
t.text.toLowerCase().includes(search.value.toLowerCase())
)

filtered.forEach((task,index)=>{

const li = document.createElement("li")

li.className="flex justify-between items-center bg-white text-black p-3 rounded-xl"

li.innerHTML = `

<div class="flex items-center gap-3">

<button class="check bg-green-500 text-white px-3 py-1 rounded">
✔
</button>

<span class="${task.done ? 'line-through opacity-50':''}">
${task.text}
</span>

</div>

<button class="delete text-red-500">
✖
</button>

`

li.querySelector(".check").onclick=()=>{

task.done=!task.done
save()
render()

}

li.querySelector(".delete").onclick=()=>{

tasks.splice(index,1)
save()
render()

}

list.appendChild(li)

})

const doneCount = tasks.filter(t=>t.done).length

counter.innerText = `Completadas ${doneCount} de ${tasks.length}`

}

document.getElementById("addBtn").onclick=()=>{

if(input.value.trim()==="") return

tasks.push({

text:input.value,
done:false

})

input.value=""

save()
render()

}

document.getElementById("sortBtn").onclick=()=>{

tasks.sort((a,b)=>a.text.localeCompare(b.text))
save()
render()

}

document.getElementById("allBtn").onclick=()=>{

filter="all"
render()

}

document.getElementById("pendingBtn").onclick=()=>{

filter="pending"
render()

}

document.getElementById("doneBtn").onclick=()=>{

filter="done"
render()

}

search.oninput = render

const modeBtn = document.getElementById("modeBtn")

let dark = localStorage.getItem("dark") === "true"

function applyMode(){

if(dark){

document.body.classList.remove("gradient")
document.body.classList.add("darkmode")
modeBtn.innerText="☀️"

}else{

document.body.classList.add("gradient")
document.body.classList.remove("darkmode")
modeBtn.innerText="🌙"

}

}

modeBtn.onclick=()=>{

dark=!dark

localStorage.setItem("dark",dark)

applyMode()

}

applyMode()
render()

</script>

</body>
</html>
