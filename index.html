<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TaskFlow PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* BODY + FOOTER FIX */
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  transition:.4s;

  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* MAIN ocupa espacio */
.main{
  flex:1;
}

/* DARK */
body.dark{
  background:linear-gradient(135deg,#0B0A18,#1A1235,#2A1A5A);
  color:#E5E7EB;
}

/* LIGHT */
body.light{
  background:linear-gradient(135deg,#FFD6E0,#E0F2FE);
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  padding:20px 60px;
}

.title{
  font-size:34px;
  background:linear-gradient(90deg,#ff7eb3,#6ec3ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* ICON BUTTONS */
.top-buttons{
  display:flex;
  gap:10px;
}

.icon-btn{
  width:42px;
  height:42px;
  border-radius:12px;
  border:none;
  cursor:pointer;
}

body.dark .icon-btn{
  background:rgba(255,255,255,0.1);
  color:white;
}

body.light .icon-btn{
  background:white;
  color:black;
}

/* BUTTONS */
.btn{
  padding:10px 16px;
  border-radius:12px;
  border:none;
  cursor:pointer;
  background:#374151;
  color:white;
  margin-right:6px;
}

/* CONTAINER */
.container{
  max-width:1500px;
  margin:auto;
  padding:0 40px;
}

/* GRID */
.layout{
  display:grid;
  gap:30px;
}

@media(min-width:1200px){
  .layout{
    grid-template-columns:1fr 1.2fr;
  }
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  padding:25px;
  border-radius:20px;
  box-sizing:border-box;
  overflow:hidden;
}

body.light .card{
  background:rgba(255,255,255,0.8);
}

/* INPUT */
.input{
  width:100%;
  padding:14px 16px;
  border-radius:14px;
  margin-bottom:14px;
  border:none;
  box-sizing:border-box;
}

body.dark .input{
  background:rgba(255,255,255,0.06);
  color:white;
}

body.light .input{
  background:white;
  color:black;
}

/* DASHBOARD */
.dashboard{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.dashboard-card{
  flex:1;
  padding:18px;
  border-radius:16px;
  text-align:center;
  font-weight:600;
  color:#111;
}

.total{background:#93C5FD;}
.completed{background:#86EFAC;}
.pending{background:#F9A8D4;}

/* TASK */
.task{
  display:flex;
  justify-content:space-between;
  padding:14px;
  border-radius:14px;
  margin-bottom:10px;
  background:rgba(255,255,255,0.08);
}

body.light .task{
  background:white;
}

.task span{
  color:#F9FAFB;
}

body.light .task span{
  color:#111;
}

.completed{
  text-decoration:line-through;
  color:#9CA3AF;
}

/* CHIPS */
.chip{
  padding:6px 12px;
  border-radius:999px;
  font-size:12px;
}

.cat-Compras{background:#FED7AA;}
.cat-Estudio{background:#E9D5FF;}
.cat-Personal{background:#BBF7D0;}
.cat-Trabajo{background:#BFDBFE;}
.cat-Gym{background:#FECACA;}

/* MODAL */
.modal{
  position:fixed;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.5);
}

.modal-content{
  padding:30px;
  border-radius:16px;
  background:white;
  text-align:center;
}

/* FOOTER */
.footer{
  margin-top:auto;
  padding:20px;
  text-align:center;
}

.link{
  color:#a78bfa;
  text-decoration:none;
}

.link:hover{
  color:#f472b6;
}

</style>

</head>

<body class="dark">

<header>
<h1 class="title">TaskFlow</h1>

<div class="top-buttons">
<button class="icon-btn" onclick="openInfo()">i</button>
<button class="icon-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
</div>
</header>

<main class="main container layout">

<div class="card">
<input id="input" class="input" placeholder="Nueva tarea...">
<input id="categoryInput" class="input" placeholder="Categoría automática...">

<button class="btn" onclick="addTask()">Añadir</button>
<button class="btn" onclick="sortTasks()">Ordenar</button>
<button class="btn" onclick="deleteAll()">Eliminar todo</button>
</div>

<div>
<div id="dashboard" class="dashboard"></div>
<div id="taskList"></div>
</div>

</main>

<!-- MODAL -->
<div id="infoModal" class="modal" onclick="closeInfo(event)">
<div class="modal-content">
<h2>TaskFlow</h2>
<p>Gestión de tareas con IA, categorías y dashboard moderno.</p>
</div>
</div>

<footer class="footer">
© 2026 TaskFlow · Project developed by Ivan Bussio (FCT) — 
<a href="https://www.corner-estudios.com" target="_blank" class="link">
🔗 Corner Estudios
</a> · All rights reserved
</footer>

<script src="script.js"></script>

</body>
</html>
