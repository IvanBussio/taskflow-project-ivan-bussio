<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TaskFlow PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
  font-family:'Poppins',sans-serif;
  margin:0;
  transition:0.4s;
}

/* 🌸 CLARO */
body.light{
  background: linear-gradient(270deg,#ffd6e0,#cde7ff,#ffd6e0);
  background-size:400% 400%;
  animation:bg 12s ease infinite;
}

/* 🌌 OSCURO */
body.dark{
  background: linear-gradient(270deg,#0a0a0f,#2a0a4a,#0a0a0f);
  background-size:400% 400%;
  animation:bg 12s ease infinite;
  color:white;
}

@keyframes bg{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  padding:20px 60px;
}

.title{
  font-size:34px;
  font-weight:600;
  background:linear-gradient(90deg,#ff7eb3,#6ec3ff);
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* BOTONES */
.btn{
  padding:10px 16px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  background:#2e2e2e;
  color:white;
  transition:.3s;
}

.btn:hover{
  transform:scale(1.08);
  background:#444;
}

/* CONTENEDOR */
.container{
  width:100%;
  max-width:1400px;
  margin:auto;
  padding:0 40px;
}

/* GRID */
.layout{
  display:grid;
  grid-template-columns:1fr;
  gap:30px;
}

@media(min-width:1200px){
  .layout{
    grid-template-columns:1fr 1.2fr;
  }
}

/* CARD */
.card{
  background:rgba(255,255,255,0.5);
  padding:25px;
  border-radius:18px;
}

.dark .card{
  background:rgba(30,30,60,0.6);
}

/* INPUTS */
.input{
  width:100%;
  padding:16px;
  border-radius:14px;
  border:none;
  margin-bottom:14px;
  box-sizing:border-box;
}

/* DASHBOARD */
.dashboard{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.dashboard-card{
  flex:1;
  padding:15px;
  border-radius:14px;
  color:white;
  text-align:center;
  font-weight:600;
}

.total{ background:#3b82f6; }
.completed{ background:#10b981; }
.pending{ background:#f59e0b; }

/* TAREAS */
.task{
  display:flex;
  justify-content:space-between;
  padding:14px;
  border-radius:14px;
  margin-bottom:10px;
  background:rgba(255,255,255,0.7);
}

.dark .task{
  background:#1e1e3f;
}

.completed{
  text-decoration:line-through;
  opacity:.6;
}

/* CHIPS */
.chip{
  padding:5px 12px;
  border-radius:10px;
  font-size:12px;
  color:white;
}

.cat-Trabajo{background:#3b82f6;}
.cat-Personal{background:#10b981;}
.cat-Compras{background:#f59e0b;}
.cat-Estudio{background:#8b5cf6;}
.cat-Gym{background:#ef4444;}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:flex;
  align-items:center;
  justify-content:center;
}

.modal-box{
  background:white;
  padding:30px;
  border-radius:18px;
  max-width:450px;
  text-align:center;
}

.dark .modal-box{
  background:#1e1e3f;
  color:white;
}

/* FOOTER */
footer{
  margin-top:40px;
  padding:20px;
  text-align:center;
  opacity:0.7;
}

</style>

</head>

<body class="light">

<header>

<h1 class="title">TaskFlow</h1>

<div>
<button class="btn" onclick="openInfo()">i</button>
<button class="btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
</div>

</header>

<main class="container layout">

<div class="card">

<input id="input" class="input" placeholder="Nueva tarea...">
<input id="categoryInput" class="input" placeholder="Categoría automática...">

<button class="btn" onclick="addTask()">Añadir</button>
<button class="btn" onclick="sortTasks()">Ordenar A-Z</button>
<button class="btn" onclick="deleteAll()">Eliminar todo</button>

</div>

<div>

<div id="dashboard" class="dashboard"></div>

<div id="taskList"></div>

</div>

</main>

<!-- INFO -->
<div id="infoModal" class="modal" style="display:none" onclick="closeInfo(event)">
  <div class="modal-box">
    <h2>TaskFlow 🚀</h2>
    <p>
      Gestiona tus tareas de forma inteligente.<br><br>
      ✔ Categorías automáticas<br>
      ✔ Orden rápido<br>
      ✔ Diseño moderno<br><br>
      Diseñado para productividad real.
    </p>
  </div>
</div>

<!-- WELCOME -->
<div id="welcome" class="modal" style="display:none">
  <div class="modal-box">
    <h2>Bienvenido 👋</h2>
    <p>Organiza tu día como un pro.</p>
    <button class="btn" onclick="closeWelcome()">Entrar</button>
  </div>
</div>

<footer>
© 2026 TaskFlow — Ivan Bussio
</footer>

<script src="script.js"></script>

</body>
</html>
