<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>

/* BASE */
body{
font-family:'Poppins',sans-serif;
overflow-x:hidden;
}

/* FONDO ANIMADO "LÁPIZ" */
.background-lines{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:-1;
overflow:hidden;
}

.line{
position:absolute;
width:2px;
height:120%;
background:rgba(255,255,255,0.1);
animation:draw 6s linear infinite;
}

@keyframes draw{
0%{transform:translateY(-100%)}
100%{transform:translateY(100%)}
}

/* MODOS */
body.light{
background:#f9fafb;
}

body.dark{
background:#020617;
color:white;
}

/* GLASS */
.glass{
background:rgba(255,255,255,.7);
backdrop-filter:blur(12px);
border-radius:20px;
padding:30px;
box-shadow:0 20px 40px rgba(0,0,0,.1);
}

.dark .glass{
background:rgba(30,41,59,.7);
}

/* BOTONES */
.btn{
padding:10px 18px;
border-radius:12px;
background:#e5e7eb;
transition:.25s;
}

.btn:hover{
transform:scale(1.05);
}

.dark .btn{
background:#1e293b;
color:white;
}

/* TAREAS */
.task{
padding:16px;
border-radius:14px;
margin-bottom:12px;
display:flex;
justify-content:space-between;
align-items:center;
background:white;
animation:fadeIn .4s ease;
}

.dark .task{
background:#1e293b;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

/* CHIP */
.chip{
background:#34d399;
color:white;
padding:4px 10px;
border-radius:20px;
font-size:12px;
margin-left:6px;
}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:flex;
align-items:center;
justify-content:center;
}

.modal-box{
background:white;
padding:40px;
border-radius:20px;
max-width:500px;
text-align:center;
animation:fadeIn .5s ease;
}

.dark .modal-box{
background:#1e293b;
color:white;
}

</style>
</head>

<body class="light min-h-screen px-8 py-6">

<!-- FONDO ANIMADO -->
<div class="background-lines">
<div class="line" style="left:10%"></div>
<div class="line" style="left:30%"></div>
<div class="line" style="left:50%"></div>
<div class="line" style="left:70%"></div>
<div class="line" style="left:90%"></div>
</div>

<!-- HEADER -->
<header class="w-full flex justify-between items-center mb-10">

<div class="flex gap-3">
<button onclick="openWelcome()" class="btn">ℹ</button>
<button id="themeToggle" class="btn">🌙</button>
</div>

<h1 class="text-5xl font-semibold">TaskFlow</h1>

</header>

<div class="w-full max-w-7xl mx-auto">

<!-- INPUT -->
<div class="glass mb-6">

<h2 class="text-2xl mb-4">Nueva tarea</h2>

<input id="taskInput" placeholder="Tarea..." class="w-full p-3 rounded mb-3 text-black"/>
<input id="categoryInput" placeholder="Categoría..." class="w-full p-3 rounded mb-4 text-black"/>

<div class="flex gap-3 flex-wrap">
<button onclick="addTask()" class="btn">Añadir</button>
<button onclick="completeAll()" class="btn">Completar todas</button>
<button onclick="deleteCompleted()" class="btn">Borrar completadas</button>
</div>

</div>

<!-- LISTA -->
<div class="glass">

<div class="flex gap-3 mb-4">
<input id="search" placeholder="Buscar..." class="flex-1 p-3 rounded text-black"/>
<button onclick="sortTasks()" class="btn">Ordenar</button>
</div>

<p id="stats" class="text-sm mb-3"></p>

<div id="taskList"></div>

</div>

</div>

<!-- MODAL -->
<div id="welcomeModal" class="modal hidden">
<div class="modal-box">

<h2 class="text-3xl mb-4">Bienvenido a TaskFlow</h2>

<p class="mb-4">
Organiza tu día con estilo.  
Arrastra tareas, crea categorías y mantén todo bajo control.
</p>

<ul class="text-left mb-4">
<li>✔ Drag & Drop</li>
<li>✔ Categorías</li>
<li>✔ Guardado automático</li>
<li>✔ Modo oscuro</li>
</ul>

<button onclick="closeWelcome()" class="btn">Empezar</button>

</div>
</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || []
let dragIndex = null

function save(){
localStorage.setItem("tasks", JSON.stringify(tasks))
}

function addTask(){
const text = taskInput.value
const category = categoryInput.value

if(!text) return

tasks.push({text,category,done:false})
taskInput.value=""
categoryInput.value=""
save()
render()
}

function render(){
const list = document.getElementById("taskList")
list.innerHTML=""

const search = document.getElementById("search").value.toLowerCase()

let completed=0

tasks.forEach((t,i)=>{

if(search && !t.text.toLowerCase().includes(search)) return

if(t.done) completed++

const div=document.createElement("div")
div.className="task"
div.draggable=true

div.ondragstart=()=>dragIndex=i
div.ondragover=(e)=>e.preventDefault()
div.ondrop=()=>{
const moved = tasks.splice(dragIndex,1)[0]
tasks.splice(i,0,moved)
save()
render()
}

div.innerHTML=`
<span style="${t.done?'text-decoration:line-through':''}">
${t.text}
${t.category?`<span class="chip">${t.category}</span>`:""}
</span>

<div>
<button onclick="toggle(${i})">✔</button>
<button onclick="removeTask(${i})">❌</button>
</div>
`

list.appendChild(div)
})

document.getElementById("stats").innerText=`${completed}/${tasks.length} completadas`
}

function toggle(i){
tasks[i].done=!tasks[i].done
save()
render()
}

function removeTask(i){
tasks.splice(i,1)
save()
render()
}

function completeAll(){
tasks.forEach(t=>t.done=true)
save()
render()
}

function deleteCompleted(){
tasks=tasks.filter(t=>!t.done)
save()
render()
}

function sortTasks(){
tasks.sort((a,b)=>a.text.localeCompare(b.text))
save()
render()
}

document.getElementById("themeToggle").onclick=()=>{
document.body.classList.toggle("dark")
document.body.classList.toggle("light")
}

function openWelcome(){
document.getElementById("welcomeModal").classList.remove("hidden")
}

function closeWelcome(){
document.getElementById("welcomeModal").classList.add("hidden")
localStorage.setItem("visited",true)
}

/* PRIMERA VEZ */
if(!localStorage.getItem("visited")){
openWelcome()
}

document.getElementById("search").addEventListener("input", render)

render()

</script>

</body>
</html>
