<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  transition: background 0.3s, color 0.3s;
}

/* 🌙 DARK MODE REAL */
.dark {
  background: linear-gradient(135deg,#020617,#0f172a);
  color: #e5e7eb;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(10px);
}
.dark .card {
  background: rgba(30,41,59,0.7);
}

/* INPUT */
.dark input, .dark select {
  background:#1e293b;
  color:white;
  border:1px solid #334155;
}

/* ✨ ANIMACIÓN SUAVE */
.task {
  transition: all 0.25s ease;
}
.task:hover {
  transform: scale(1.02);
}

/* 🌈 FONDO SUAVE (NO CUTRE) */
body::before {
  content:"";
  position:fixed;
  inset:0;
  background: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.3), transparent),
              radial-gradient(circle at 80% 80%, rgba(255,255,255,0.2), transparent);
  z-index:-1;
}
</style>
</head>

<body id="body" class="bg-gradient-to-r from-pink-300 to-blue-300 p-4">

<div class="max-w-md mx-auto card p-4 rounded-xl shadow">

  <!-- HEADER -->
  <div class="flex justify-between items-center mb-3">
    <h1 class="text-xl font-bold">TaskFlow</h1>
    <div class="flex gap-2">
      <button id="infoBtn">ℹ️</button>
      <button id="modoBtn">🌙</button>
    </div>
  </div>

  <!-- BUSCADOR -->
  <input id="buscador" placeholder="Buscar..." class="w-full p-2 mb-2 border rounded">

  <!-- INPUT -->
  <input id="inputTarea" placeholder="Nueva tarea..." class="w-full p-2 mb-2 border rounded">

  <!-- BOTONES -->
  <div class="flex gap-2 mb-2">
    <button id="addBtn" class="bg-blue-500 text-white px-3 py-1 rounded">Añadir</button>
    <button id="ordenBtn" class="bg-purple-500 text-white px-3 py-1 rounded">Ordenar</button>
  </div>

  <!-- STATS -->
  <div id="stats" class="flex justify-between text-sm mb-2"></div>

  <!-- LISTA -->
  <div id="lista"></div>

</div>

<!-- MODAL INFO -->
<div id="modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center">
  <div class="bg-white p-4 rounded">
    <p>TaskFlow - Gestor de tareas</p>
    <button onclick="cerrarModal()">Cerrar</button>
  </div>
</div>

<script>
let tareas = [];
let filtro = "";
let dark = false;
let asc = true;

// INIT
window.onload = () => {
  cargar();
  render();
};

// STORAGE
function cargar(){
  tareas = JSON.parse(localStorage.getItem("tareas")) || [];
  dark = JSON.parse(localStorage.getItem("dark")) || false;
  aplicarModo();
}

function guardar(){
  localStorage.setItem("tareas", JSON.stringify(tareas));
  localStorage.setItem("dark", JSON.stringify(dark));
}

// AGREGAR
function agregar(){
  let txt = inputTarea.value.trim();
  if(!txt) return;

  tareas.push({texto:txt, completada:false});
  inputTarea.value="";
  guardar();
  render();
}

// TOGGLE
function toggle(i){
  tareas[i].completada = !tareas[i].completada;
  guardar();
  render();
}

// ELIMINAR
function eliminar(i){
  tareas.splice(i,1);
  guardar();
  render();
}

// RENDER
function render(){
  let lista = document.getElementById("lista");

  let filtradas = tareas.filter(t =>
    t.texto.toLowerCase().includes(filtro)
  );

  lista.innerHTML="";

  filtradas.forEach(t=>{
    let i = tareas.indexOf(t);

    let div = document.createElement("div");
    div.className="task bg-white p-2 mb-2 rounded flex justify-between";

    div.innerHTML=`
      <span class="${t.completada?'line-through':''}">${t.texto}</span>
      <div>
        <input type="checkbox" ${t.completada?"checked":""} onchange="toggle(${i})">
        <button onclick="eliminar(${i})">🗑</button>
      </div>
    `;

    lista.appendChild(div);
  });

  stats.innerHTML = `
    <span>${tareas.length}</span>
    <span>✔ ${tareas.filter(t=>t.completada).length}</span>
  `;
}

// BUSCAR
buscador.oninput = e=>{
  filtro = e.target.value.toLowerCase();
  render();
};

// ORDEN
ordenBtn.onclick = ()=>{
  tareas.sort((a,b)=> asc ? a.texto.localeCompare(b.texto) : b.texto.localeCompare(a.texto));
  asc = !asc;
  render();
};

// DARK MODE (FIX REAL)
modoBtn.onclick = ()=>{
  dark = !dark;
  guardar();
  aplicarModo();
};

function aplicarModo(){
  document.body.classList.toggle("dark", dark);
}

// INFO
infoBtn.onclick = ()=>{
  modal.classList.remove("hidden");
};

function cerrarModal(){
  modal.classList.add("hidden");
}

// ENTER
inputTarea.onkeydown = e=>{
  if(e.key==="Enter") agregar();
};

// BOTÓN
addBtn.onclick = agregar;

</script>

</body>
</html>
