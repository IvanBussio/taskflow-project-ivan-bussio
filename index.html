<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:'Poppins',sans-serif;
min-height:100vh;
background:linear-gradient(-45deg,#667eea,#764ba2,#6a89cc,#b8e994);
background-size:400% 400%;
animation:gradientBG 15s ease infinite;
color:white;
overflow-x:hidden;
}

@keyframes gradientBG{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

header{
text-align:center;
padding:50px 20px 20px 20px;
}

header h1{
margin:0;
font-size:36px;
font-weight:600;
letter-spacing:1px;
}

header p{
margin-top:10px;
opacity:.9;
}

.board{
display:flex;
justify-content:center;
gap:30px;
padding:30px;
flex-wrap:wrap;
}

.column{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(12px);
border-radius:16px;
padding:20px;
width:300px;
box-shadow:0 15px 40px rgba(0,0,0,0.25);
transition:transform .2s;
}

.column:hover{
transform:translateY(-6px);
}

.column h3{
margin-top:0;
font-weight:600;
}

.tasks{
min-height:80px;
margin-bottom:10px;
}

.task{
background:white;
color:#2f3640;
padding:12px;
border-radius:10px;
margin-bottom:12px;
box-shadow:0 6px 16px rgba(0,0,0,0.2);
cursor:grab;
transition:transform .15s, box-shadow .15s;
}

.task:hover{
transform:scale(1.03);
box-shadow:0 10px 20px rgba(0,0,0,0.25);
}

.add-task{
display:flex;
gap:6px;
}

.add-task input{
flex:1;
padding:10px;
border-radius:6px;
border:none;
outline:none;
font-family:'Poppins';
text-align:center;
min-width:0;
}

button{
padding:10px;
border:none;
border-radius:6px;
background:#00a8ff;
color:white;
font-weight:500;
cursor:pointer;
width:42px;
flex-shrink:0;
}

button.delete{
background:#e84118;
margin-top:8px;
width:100%;
}

.stats{
text-align:center;
margin-top:10px;
font-size:14px;
opacity:.9;
}

footer{
text-align:center;
padding:20px;
font-size:14px;
opacity:.8;
}
</style>
</head>

<body>

<header>
<h1>TaskFlow Pro</h1>
<p>Organiza tu trabajo con un tablero Kanban moderno</p>
</header>

<div class="board">

<div class="column" data-column="todo">
<h3>To Do</h3>
<div class="tasks"></div>
<div class="add-task">
<input placeholder="Nueva tarea" />
<button onclick="addTask(this)">+</button>
</div>
<div class="stats"></div>
</div>

<div class="column" data-column="doing">
<h3>Doing</h3>
<div class="tasks"></div>
<div class="add-task">
<input placeholder="Nueva tarea" />
<button onclick="addTask(this)">+</button>
</div>
<div class="stats"></div>
</div>

<div class="column" data-column="done">
<h3>Done</h3>
<div class="tasks"></div>
<div class="add-task">
<input placeholder="Nueva tarea" />
<button onclick="addTask(this)">+</button>
</div>
<div class="stats"></div>
</div>

</div>

<footer>
TaskFlow Project • HTML • CSS • JavaScript
</footer>

<script>
let data = JSON.parse(localStorage.getItem("kanban") || '{"todo":[],"doing":[],"done":[]}')

function save(){
localStorage.setItem("kanban",JSON.stringify(data))
render()
}

function render(){
document.querySelectorAll(".column").forEach(col=>{
const name = col.dataset.column
const container = col.querySelector(".tasks")
const stats = col.querySelector(".stats")

container.innerHTML=""


data[name].forEach((task,i)=>{
const div=document.createElement("div")
div.className="task"
div.draggable=true


div.innerHTML=`${task}<br><button class="delete" onclick="deleteTask('${name}',${i})">Eliminar</button>`

container.appendChild(div)
})

stats.innerText = data[name].length + " tareas"
})

initDrag()
}

function addTask(btn){
const input = btn.parentElement.querySelector("input")
const column = btn.closest(".column").dataset.column
const value = input.value.trim()

if(!value) return

data[column].push(value)
input.value=""

save()
}

function deleteTask(column,index){
data[column].splice(index,1)
save()
}

function initDrag(){
let dragged


document.querySelectorAll(".task").forEach(task=>{

const column = task.closest(".column").dataset.column
const index = Array.from(task.parentNode.children).indexOf(task)

task.addEventListener("dragstart",()=>{
dragged = {task,column,index}
})

})


document.querySelectorAll(".tasks").forEach(zone=>{

zone.addEventListener("dragover",e=>{
e.preventDefault()
})

zone.addEventListener("drop",()=>{

const newColumn = zone.closest(".column").dataset.column

const moved = data[dragged.column].splice(dragged.index,1)[0]

data[newColumn].push(moved)

save()

})

})
}

render()
</script>

</body>
</html>
