<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TaskFlow</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
font-family:'Poppins',sans-serif;
transition:background .6s;
}

/* fondo claro */

body.light{
background:linear-gradient(120deg,#ffd1dc,#ffe5ec,#f1c0e8);
background-size:300% 300%;
animation:bgmove 18s infinite alternate;
}

/* fondo oscuro */

body.dark{
background:linear-gradient(120deg,#0f172a,#1e293b,#020617);
background-size:300% 300%;
animation:bgmove 18s infinite alternate;
color:white;
}

@keyframes bgmove{
0%{background-position:0% 50%;}
100%{background-position:100% 50%;}
}

/* contenedores */

.glass{
background:rgba(255,255,255,.25);
backdrop-filter:blur(14px);
border-radius:18px;
padding:25px;
box-shadow:0 15px 35px rgba(0,0,0,.2);
}

.dark .glass{
background:rgba(30,41,59,.7);
}

/* botones */

.btn{
padding:8px 16px;
border-radius:10px;
background:rgba(255,255,255,.35);
transition:.25s;
}

.btn:hover{
transform:translateY(-3px) scale(1.05);
background:rgba(255,255,255,.6);
}

.dark .btn{
background:rgba(255,255,255,.1);
}

/* input */

input{
color:#111;
}

.dark input{
color:white;
background:rgba(255,255,255,.1);
}

/* barra progreso */

.progress{
height:8px;
border-radius:6px;
background:rgba(255,255,255,.4);
}

.progressbar{
height:8px;
border-radius:6px;
background:#34d399;
}

/* modal */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.5);
display:flex;
align-items:center;
justify-content:center;
}

.modal-box{
background:white;
padding:40px;
border-radius:20px;
max-width:500px;
text-align:center;
}

.dark .modal-box{
background:#1e293b;
color:white;
}

</style>

</head>

<body class="light min-h-screen flex flex-col items-center p-8">

<header class="w-full max-w-3xl flex justify-between items-center mb-8">

<h1 class="text-4xl font-semibold">TaskFlow</h1>

<button id="themeToggle" class="btn">🌙</button>

</header>

<button onclick="openWelcome()" class="btn mb-6">ℹ Sobre TaskFlow</button>

<!-- NUEVA TAREA -->

<div class="glass w-full max-w-3xl mb-6">

<h2 class="text-xl mb-3">Nueva tarea</h2>

<input
id="taskInput"
placeholder="Escribe una tarea..."
class="w-full p-2 rounded mb-3"
/>

<div class="flex gap-2 flex-wrap">

<button onclick="addTask()" class="btn">Añadir</button>
<button onclick="completeAll()" class="btn">Completar todas</button>
<button onclick="deleteCompleted()" class="btn">Borrar completadas</button>

</div>

</div>

<!-- LISTA -->

<div class="glass w-full max-w-3xl">

<div class="flex gap-2 mb-3">

<input
id="search"
placeholder="Buscar tarea..."
class="flex-1 p-2 rounded"
/>

<button onclick="sortTasks()" class="btn">Ordenar</button>

</div>

<div class="flex gap-2 mb-2 flex-wrap">

<button onclick="setFilter('all')" class="btn">Todas</button>
<button onclick="setFilter('pending')" class="btn">Pendientes</button>
<button onclick="setFilter('completed')" class="btn">Completadas</button>

</div>

<p id="stats" class="text-sm mb-2"></p>

<div class="progress mb-4">
<div id="progressBar" class="progressbar"></div>
</div>

<div id="taskList" class="space-y-3"></div>

</div>

<!-- MODAL -->

<div id="welcomeModal" class="modal hidden">

<div class="modal-box">

<h2 class="text-2xl mb-4">Bienvenido a TaskFlow</h2>

<p class="mb-4">
TaskFlow es una aplicación para organizar tus tareas diarias de forma simple,
visual y eficiente.
</p>

<p class="mb-4">
Puedes crear tareas, completarlas, filtrarlas, buscarlas y mantener
tu productividad bajo control.
</p>

<button onclick="closeWelcome()" class="btn">Cerrar</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
