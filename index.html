<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TaskFlow</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

background: linear-gradient(135deg,#0f172a,#1e3a8a,#7c3aed);

display:flex;
justify-content:center;
align-items:flex-start;

padding:20px;

color:white;

}

.container{

width:100%;
max-width:500px;

}

header{

text-align:center;
margin-bottom:25px;
position:relative;

}

header h1{

font-size:38px;
font-weight:600;

}

header p{

opacity:0.8;
margin-top:5px;

}

.theme{

position:absolute;
right:0;
top:0;
font-size:26px;
cursor:pointer;

}

.card{

background:rgba(255,255,255,0.12);
backdrop-filter:blur(15px);

border-radius:20px;

padding:20px;

margin-bottom:20px;

}

.input-container{

display:flex;
gap:10px;
flex-wrap:wrap;

}

.input-container input{

flex:1;
padding:12px;

border:none;
border-radius:12px;

outline:none;

}

.add-btn{

background:linear-gradient(135deg,#3b82f6,#6366f1);

border:none;
border-radius:12px;

padding:12px 18px;

color:white;
font-weight:500;

cursor:pointer;

}

.search-container{

display:flex;
gap:10px;
margin-bottom:15px;

}

.search-container input{

flex:1;
padding:10px;

border:none;
border-radius:10px;

}

.sort-btn{

padding:10px 14px;

border:none;

border-radius:10px;

background:white;

cursor:pointer;

}

.filters{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:10px;

margin-bottom:15px;

}

.filter-btn{

padding:10px;

border:none;

border-radius:10px;

cursor:pointer;

font-weight:500;

}

.all{

background:#e5e7eb;

}

.pending{

background:linear-gradient(135deg,#3b82f6,#6366f1);

color:white;

}

.done{

background:linear-gradient(135deg,#8b5cf6,#a78bfa);

color:white;

}

.counter{

opacity:0.8;

font-size:14px;

}

.task{

background:white;

color:#111;

padding:12px;

border-radius:10px;

margin-bottom:10px;

display:flex;

justify-content:space-between;

align-items:center;

}

.task button{

background:#22c55e;

border:none;

padding:6px 10px;

border-radius:8px;

color:white;

cursor:pointer;

}

</style>

</head>

<body>

<div class="container">

<header>

<h1>TaskFlow</h1>
<p>Bienvenido a TaskFlow</p>

<div class="theme">☀️</div>

</header>

<div class="card">

<div class="input-container">

<input id="taskInput" placeholder="Nueva tarea...">

<button class="add-btn" onclick="addTask()">Añadir tarea</button>

</div>

</div>

<div class="card">

<div class="search-container">

<input placeholder="Buscar tarea...">

<button class="sort-btn">Ordenar</button>

</div>

<div class="filters">

<button class="filter-btn all">Todas</button>
<button class="filter-btn pending">Pendientes</button>
<button class="filter-btn done">Completadas</button>

</div>

<div class="counter">

Completadas <span id="done">0</span> de <span id="total">0</span>

</div>

<div id="taskList"></div>

</div>

</div>

<script>

let tasks=[]

function addTask(){

let input=document.getElementById("taskInput")

if(input.value==="")return

tasks.push({
text:input.value,
done:false
})

input.value=""

render()

}

function render(){

let list=document.getElementById("taskList")

list.innerHTML=""

let doneCount=0

tasks.forEach((task,index)=>{

if(task.done)doneCount++

let div=document.createElement("div")

div.className="task"

div.innerHTML=`
${task.text}
<button onclick="toggle(${index})">✔</button>
`

list.appendChild(div)

})

document.getElementById("done").innerText=doneCount
document.getElementById("total").innerText=tasks.length

}

function toggle(i){

tasks[i].done=!tasks[i].done

render()

}

</script>

</body>

</html>
