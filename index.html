<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TaskFlow Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#0f172a;
color:white;
min-height:100vh;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:#020617;
border-bottom:1px solid #1e293b;
}

.logo{
font-size:22px;
font-weight:600;
color:#60a5fa;
}

.menu a{
margin:0 10px;
color:#94a3b8;
text-decoration:none;
}

.menu a:hover{
color:white;
}

/* CONTENEDOR */

.container{
max-width:900px;
margin:40px auto;
padding:20px;
}

/* CARDS */

.card{
background:#1e293b;
padding:25px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.card h2{
margin-bottom:10px;
}

/* INPUT */

input, textarea{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#334155;
color:white;
}

button{
margin-top:10px;
padding:10px 16px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

/* TAREAS */

.task{
background:#334155;
padding:12px;
border-radius:8px;
margin-top:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.task.completed{
background:#16a34a;
}

.actions button{
margin-left:5px;
padding:5px 10px;
}

</style>

</head>

<body>

<div class="navbar">

<div class="logo">TaskFlow</div>

<div class="menu">
<a href="#">Inicio</a>
<a href="#">Tareas</a>
<a href="#">Perfil</a>
</div>

</div>

<div class="container">

<div class="card">

<h2>Bienvenido a TaskFlow</h2>

<p>Organiza tus tareas y mantén tu productividad bajo control.</p>

</div>

<div class="card">

<h2>Crear nueva tarea</h2>

<input id="title" placeholder="Título de la tarea">

<textarea id="desc" placeholder="Descripción"></textarea>

<button onclick="addTask()">Añadir tarea</button>

</div>

<div class="card">

<h2>Tus tareas</h2>

<div id="tasks"></div>

</div>

</div>

<script>

function addTask(){

const title=document.getElementById("title").value
const desc=document.getElementById("desc").value

if(!title) return

const task=document.createElement("div")
task.className="task"

task.innerHTML=`
<div>
<strong>${title}</strong>
<p>${desc}</p>
</div>

<div class="actions">
<button onclick="completeTask(this)">✔</button>
<button onclick="deleteTask(this)">🗑</button>
</div>
`

document.getElementById("tasks").appendChild(task)

document.getElementById("title").value=""
document.getElementById("desc").value=""

}

function completeTask(btn){

const task=btn.parentElement.parentElement
task.classList.toggle("completed")

}

function deleteTask(btn){

btn.parentElement.parentElement.remove()

}

</script>

</body>
</html>
