<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TaskFlow</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

background:
radial-gradient(circle at 20% 30%, #2dd4bf, transparent 40%),
radial-gradient(circle at 80% 20%, #1e3a8a, transparent 40%),
radial-gradient(circle at 50% 90%, #7c3aed, transparent 50%),
#0f172a;

display:flex;
flex-direction:column;
align-items:center;
padding:40px 20px;

color:white;

}

h1{

font-size:48px;
margin-bottom:10px;

}

.welcome{

margin-bottom:30px;
font-size:20px;
opacity:0.9;

}

.container{

max-width:420px;
width:100%;

}

.card{

background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);

border-radius:20px;

padding:25px;

margin-bottom:20px;

box-shadow:0 10px 25px rgba(0,0,0,0.3);

}

input{

width:100%;
padding:15px;

border-radius:12px;
border:none;

font-size:16px;

margin-bottom:15px;

}

button{

border:none;

padding:14px 18px;

border-radius:12px;

font-size:16px;

cursor:pointer;

transition:all .2s ease;

}

button:hover{

transform:scale(1.05);

}

.add{

background:#3b82f6;
color:white;

}

.row{

display:flex;
gap:10px;

margin-top:10px;

}

.row input{

flex:1;

}

.btn{

padding:10px 16px;
border-radius:10px;
font-size:14px;

}

.btn-all{

background:#d1d5db;
color:#111;

}

.btn-pending{

background:#3b82f6;
color:white;

}

.btn-done{

background:#8b5cf6;
color:white;

}

.tasks{

margin-top:15px;

}

.task{

background:rgba(255,255,255,0.1);

padding:12px;

border-radius:10px;

margin-bottom:8px;

display:flex;

justify-content:space-between;

align-items:center;

}

.task.completed{

text-decoration:line-through;
opacity:.6;

}

.stats{

margin-top:10px;
font-size:14px;
opacity:.8;

}

.sun{

position:absolute;
top:25px;
right:25px;
font-size:30px;

}

</style>

</head>

<body>

<div class="sun">☀️</div>

<h1>TaskFlow</h1>

<div class="welcome">Bienvenido a TaskFlow</div>

<div class="container">

<div class="card">

<input id="taskInput" placeholder="Nueva tarea...">

<button class="add" onclick="addTask()">Añadir tarea</button>

</div>

<div class="card">

<div class="row">

<input id="search" placeholder="Buscar tarea..." onkeyup="renderTasks()">

<button onclick="sortTasks()">Ordenar</button>

</div>

<div class="row">

<button class="btn btn-all" onclick="filter='all';renderTasks()">Todas</button>

<button class="btn btn-pending" onclick="filter='pending';renderTasks()">Pendientes</button>

<button class="btn btn-done" onclick="filter='done';renderTasks()">Completadas</button>

</div>

<div class="tasks" id="tasks"></div>

<div class="stats" id="stats">Completadas 0 de 0</div>

</div>

</div>

<script>

let tasks=[]

let filter='all'

function addTask(){

const input=document.getElementById('taskInput')

if(!input.value.trim()) return

tasks.push({

text:input.value,

done:false

})

input.value=''

renderTasks()

}

function toggleTask(index){

tasks[index].done=!tasks[index].done

renderTasks()

}

function deleteTask(index){

tasks.splice(index,1)

renderTasks()

}

function sortTasks(){

tasks.sort((a,b)=>a.done-b.done)

renderTasks()

}

function renderTasks(){

const list=document.getElementById('tasks')

const search=document.getElementById('search').value.toLowerCase()

list.innerHTML=''

let visible=tasks.filter(task=>task.text.toLowerCase().includes(search))

if(filter==='pending') visible=visible.filter(t=>!t.done)

if(filter==='done') visible=visible.filter(t=>t.done)

visible.forEach((task,i)=>{

const div=document.createElement('div')

div.className='task'+(task.done?' completed':'')

div.innerHTML=`

<span onclick="toggleTask(${i})">${task.text}</span>

<button onclick="deleteTask(${i})">❌</button>

`

list.appendChild(div)

})

updateStats()

}

function updateStats(){

const total=tasks.length

const done=tasks.filter(t=>t.done).length

document.getElementById('stats').innerText=`Completadas ${done} de ${total}`

}

</script>

</body>
</html>
