<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Poppins',sans-serif;min-height:100vh;background:#0f172a;color:white}

header{display:flex;flex-direction:column;align-items:center;padding:40px 20px 10px;text-align:center}
header h1{margin:0;font-size:34px}
header p{opacity:.9;margin-top:6px}

.dashboard{display:flex;gap:15px;margin-top:20px;flex-wrap:wrap;justify-content:center}
.card{background:rgba(255,255,255,0.15);padding:12px 18px;border-radius:12px;font-size:14px;min-width:120px}
.card strong{display:block;font-size:20px}

.progress-wrapper{width:260px;margin-top:15px}
.progress-bar{height:10px;background:rgba(255,255,255,0.3);border-radius:10px;overflow:hidden}
.progress{height:100%;background:#00e676;width:0%;transition:width .3s}

.board{display:flex;justify-content:center;gap:30px;padding:30px;flex-wrap:wrap}

.column{background:rgba(255,255,255,0.15);border-radius:16px;padding:20px;width:300px}

.tasks{min-height:80px;margin-bottom:10px}

.task{background:white;color:#2f3640;padding:12px;border-radius:10px;margin-bottom:12px}

.add-task{display:flex;gap:8px;width:100%}
.add-task input{flex:1;padding:10px;border-radius:6px;border:none}

button{padding:10px;border:none;border-radius:6px;background:#00a8ff;color:white;font-weight:500;cursor:pointer;width:42px;display:flex;align-items:center;justify-content:center}

button.delete{background:#e84118;margin-top:8px;width:100%}

button.complete{background:#2ecc71;margin-top:8px;width:100%}

.clear-done{margin-top:10px;width:100%;background:#ff7675;padding:10px;border:none;border-radius:6px;color:white;cursor:pointer}

.stats{text-align:center;margin-top:10px;font-size:14px}

footer{text-align:center;padding:20px;font-size:14px;opacity:.8}
</style>
</head>

<body>

<header>
<h1>TaskFlow Pro</h1>
<p>Organize your work with a modern Kanban board</p>

<div class="dashboard">
<div class="card">Total Tasks<strong id="totalTasks">0</strong></div>
<div class="card">Completed<strong id="doneTasks">0</strong></div>
<div class="card">In Progress<strong id="doingTasks">0</strong></div>
</div>

<div class="progress-wrapper">
<div class="progress-bar">
<div class="progress" id="progress"></div>
</div>
</div>

</header>

<div class="board">

<div class="column" data-column="todo">
<h3>📌 To Do</h3>
<div class="tasks"></div>
<div class="add-task">
<input class="task-input" placeholder="New task" />
<button onclick="toggleDate(this)">📅</button>
<button onclick="togglePriority(this)">⚑</button>
<button onclick="addTask(this)">+</button>
<input type="date" class="date-picker" style="display:none" />
<select class="priority-picker" style="display:none">
<option value="Low">Low</option>
<option value="Medium" selected>Medium</option>
<option value="High">High</option>
</select>
</div>
<div class="stats"></div>
</div>

<div class="column" data-column="doing">
<h3>⚙️ Doing</h3>
<div class="tasks"></div>
<div class="stats"></div>
</div>

<div class="column" data-column="done">
<h3>✅ Done</h3>
<div class="tasks"></div>
<button class="clear-done" onclick="clearDone()">Clear completed</button>
<div class="stats"></div>
</div>

</div>

<footer>
© 2026 TaskFlow • Developed by Ivan Bussio • FCT at www.corner-estudios.com • All rights reserved.
</footer>

<script>

let pendingDate = ""
let pendingPriority = ""

let data = JSON.parse(localStorage.getItem("kanban") || '{"todo":[],"doing":[],"done":[]}')

function save(){
localStorage.setItem("kanban",JSON.stringify(data))
render()
}

function render(){

let total = data.todo.length + data.doing.length + data.done.length
let progress = total ? (data.done.length / total) * 100 : 0


document.getElementById("totalTasks").innerText = total

document.getElementById("doneTasks").innerText = data.done.length

document.getElementById("doingTasks").innerText = data.doing.length

document.getElementById("progress").style.width = progress + "%"


document.querySelectorAll(".column").forEach(col=>{

const name = col.dataset.column
const container = col.querySelector(".tasks")
const stats = col.querySelector(".stats")

container.innerHTML=""


data[name].forEach((task,i)=>{

const div=document.createElement("div")
div.className="task"
div.draggable=true

let button=""

if(name==='doing'){
button=`<button class="complete" onclick="completeTask(${i})">Complete</button>`
}else{
button=`<button class="delete" onclick="deleteTask('${name}',${i})">Move</button>`
}


div.innerHTML=`
<span ondblclick="editTask('${name}',${i})">${task}</span>
${button}
`

container.appendChild(div)

})

stats.innerText = data[name].length + " tasks"

})

initDrag()

}

function addTask(btn){

const container = btn.parentElement
const column = btn.closest(".column").dataset.column
const input = container.querySelector(".task-input")
const datePicker = container.querySelector('.date-picker')
const priorityPicker = container.querySelector('.priority-picker')

const text = input.value.trim()
if(!text) return

let taskText = text

if(priorityPicker && priorityPicker.value){
 taskText += " [" + priorityPicker.value + "]"
}

if(datePicker && datePicker.value){
 taskText += " (" + datePicker.value + ")"
}

if(!data[column]) data[column] = []

data[column].push(taskText)

input.value = ""
if(datePicker) datePicker.value = ""

save()

}

function toggleDate(btn){
const container = btn.parentElement
const picker = container.querySelector('.date-picker')
picker.style.display = picker.style.display === 'none' ? 'block' : 'none'
}

function togglePriority(btn){
const container = btn.parentElement
const picker = container.querySelector('.priority-picker')
picker.style.display = picker.style.display === 'none' ? 'block' : 'none'
}

if(pendingDate){
 text += " (" + pendingDate + ")"
}

 data[column].push(text)

 input.value=""
 pendingDate=""
 pendingPriority=""

 save()

}

}

function setDate(btn){

const date = prompt("Due date (YYYY-MM-DD)")

if(date){
 pendingDate = date
}

}

function setPriority(btn){

const priority = prompt("Priority: High, Medium or Low")

if(priority){
 pendingPriority = priority
}

}

function editTask(column,index){

const newText = prompt("Edit task", data[column][index])

if(newText){data[column][index]=newText}

save()

}

function deleteTask(column,index){

if(column==='todo'){
 const moved = data.todo.splice(index,1)[0]
 data.doing.push(moved)
}
else if(column==='doing'){
 const moved = data.doing.splice(index,1)[0]
 data.done.push(moved)
}
else{
 data.done.splice(index,1)
}

save()

}

function completeTask(index){

const moved = data.doing.splice(index,1)[0]

data.done.push(moved)

save()

}

function clearDone(){

data.done=[]

save()

}

function initDrag(){

let dragged


document.querySelectorAll(".task").forEach((task,index)=>{

const column = task.closest(".column").dataset.column


task.addEventListener("dragstart",()=>{
 dragged={column,index}
})

})


document.querySelectorAll(".tasks").forEach(zone=>{

zone.addEventListener("dragover",e=>{
 e.preventDefault()
})

zone.addEventListener("drop",()=>{

if(!dragged) return

const newColumn = zone.closest(".column").dataset.column

const moved = data[dragged.column].splice(dragged.index,1)[0]

if(!moved) return


data[newColumn].push(moved)

save()

})

})

}

render()

</script>

</body>
</html>
